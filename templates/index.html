<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --light: #f5f6fa;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            height: 100vh;
            display: flex;
            background: white;
            border-radius: 20px;
            margin: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: var(--primary);
            color: white;
        }
        
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: var(--light);
        }
        
        .chat-item.active {
            background: var(--secondary);
            color: white;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--light);
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message.received {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message.sent .message-content {
            background: var(--primary);
            color: white;
        }
        
        .message.received .message-content {
            background: white;
            color: var(--dark);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .search-results {
            position: absolute;
            background: white;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h4><i class="fas fa-comment-dots"></i> EvaMassage</h4>
                <small>Welcome, {{ user.full_name }}</small>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search people...">
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>
            
            <div class="chat-list" id="chatList">
                <div class="text-center text-muted p-3">Loading chats...</div>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <h5 id="chatUserName" class="mb-0">Select a chat</h5>
                    <small id="chatStatus" class="text-muted">Click on a contact to start messaging</small>
                </div>
                <button class="btn btn-outline-primary btn-sm" onclick="viewProfile()">
                    <i class="fas fa-user"></i> Profile
                </button>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="text-center text-muted mt-5">
                    <i class="fas fa-comments fa-3x mb-3"></i>
                    <p>Select a conversation to start messaging</p>
                </div>
            </div>
            
            <div class="chat-input">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">User Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="profileContent">
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentChatId = null;
        let messageInterval = null;
        
        // Load chats
        function loadChats() {
            $.get('/api/chats', function(chats) {
                let html = '';
                chats.forEach(chat => {
                    html += `
                        <div class="chat-item" onclick="loadChat(${chat.user_id})">
                            <div class="d-flex align-items-center">
                                <div class="avatar me-2">
                                    ${chat.full_name ? chat.full_name.charAt(0) : chat.username.charAt(0)}
                                </div>
                                <div>
                                    <strong>${chat.full_name || chat.username}</strong><br>
                                    <small>@${chat.username}</small>
                                </div>
                            </div>
                        </div>
                    `;
                });
                if (html === '') {
                    html = '<div class="text-center text-muted p-3">No chats yet. Search for people to start messaging!</div>';
                }
                $('#chatList').html(html);
            });
        }
        
        // Load specific chat
        function loadChat(userId) {
            currentChatId = userId;
            
            // Get user profile
            $.get(`/api/users/profile/${userId}`, function(profile) {
                $('#chatUserName').text(profile.full_name || profile.username);
                $('#chatStatus').text(`@${profile.username}`);
                
                // Load messages
                loadMessages(userId);
            });
            
            // Highlight active chat
            $('.chat-item').removeClass('active');
            $(event.currentTarget).addClass('active');
        }
        
        // Load messages
        function loadMessages(userId) {
            $.get(`/api/messages/${userId}`, function(messages) {
                let html = '';
                messages.forEach(msg => {
                    const isSent = msg.from_id === {{ user.user_id }};
                    html += `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div class="message-content">
                                ${escapeHtml(msg.message)}
                                <div class="message-time">
                                    ${new Date(msg.created_at).toLocaleTimeString()}
                                </div>
                            </div>
                        </div>
                    `;
                });
                $('#messagesArea').html(html);
                scrollToBottom();
            });
        }
        
        // Send message
        function sendMessage() {
            const message = $('#messageInput').val();
            if (message && currentChatId) {
                $.post('/api/messages/send', {
                    to_id: currentChatId,
                    message: message
                }, function(response) {
                    if (response.success) {
                        $('#messageInput').val('');
                        loadMessages(currentChatId);
                    }
                });
            }
        }
        
        // Search users
        let searchTimeout;
        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const query = $(this).val();
            
            if (query.length > 1) {
                searchTimeout = setTimeout(() => {
                    $.get(`/api/users/search?q=${query}`, function(users) {
                        let html = '';
                        users.forEach(user => {
                            html += `
                                <div class="p-3 border-bottom" style="cursor: pointer" onclick="startChat(${user.user_id})">
                                    <strong>${user.full_name || user.username}</strong><br>
                                    <small>@${user.username}</small>
                                    <p class="text-muted small mb-0">${user.bio || 'No bio'}</p>
                                </div>
                            `;
                        });
                        if (html) {
                            $('#searchResults').html(html).show();
                        } else {
                            $('#searchResults').hide();
                        }
                    });
                }, 500);
            } else {
                $('#searchResults').hide();
            }
        });
        
        function startChat(userId) {
            $('#searchInput').val('');
            $('#searchResults').hide();
            loadChat(userId);
            loadChats();
        }
        
        function viewProfile() {
            if (currentChatId) {
                $.get(`/api/users/profile/${currentChatId}`, function(profile) {
                    let html = `
                        <div class="text-center">
                            <div class="avatar mx-auto mb-3" style="width: 80px; height: 80px; font-size: 32px;">
                                ${profile.full_name ? profile.full_name.charAt(0) : profile.username.charAt(0)}
                            </div>
                            <h5>${profile.full_name || profile.username}</h5>
                            <p class="text-muted">@${profile.username}</p>
                            <p>${profile.bio || 'No bio available'}</p>
                            <small class="text-muted">Joined: ${new Date(profile.joined).toLocaleDateString()}</small>
                        </div>
                    `;
                    $('#profileContent').html(html);
                    new bootstrap.Modal(document.getElementById('profileModal')).show();
                });
            }
        }
        
        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            area.scrollTop = area.scrollHeight;
        }
        
        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Auto-refresh messages every 3 seconds
        setInterval(() => {
            if (currentChatId) {
                loadMessages(currentChatId);
            }
        }, 3000);
        
        // Enter key to send
        $('#messageInput').on('keypress', function(e) {
            if (e.which === 13) {
                sendMessage();
            }
        });
        
        // Initial load
        loadChats();
    </script>
</body>
</html>
