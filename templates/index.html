<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#f0f2f5;}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;padding:10px;border-top:1px solid #ddd;z-index:100;}
        .nav-item{flex:1;text-align:center;background:none;border:none;padding:5px;color:#666;}
        .nav-item.active{color:#00a884;}
        .nav-item i{font-size:24px;display:block;}
        .panel-left{width:350px;background:#fff;height:100vh;overflow-y:auto;border-right:1px solid #ddd;padding-bottom:70px;}
        .panel-right{flex:1;background:#efeae2;height:100vh;display:flex;flex-direction:column;}
        .topbar{background:#075e54;color:#fff;padding:12px;display:flex;justify-content:space-between;}
        .search{padding:8px;background:#fff;}
        .search input{width:100%;padding:8px;border:1px solid #ddd;border-radius:20px;}
        .chat-item{display:flex;padding:12px;border-bottom:1px solid #eee;cursor:pointer;align-items:center;gap:10px;}
        .chat-item:hover{background:#f5f5f5;}
        .avatar{width:45px;height:45px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;}
        .messages-area{flex:1;overflow-y:auto;padding:15px;padding-bottom:80px;}
        .msg{max-width:70%;margin-bottom:10px;padding:8px 12px;border-radius:18px;}
        .msg.sent{background:#dcf8c5;margin-left:auto;text-align:right;}
        .msg.recv{background:#fff;}
        .input-area{display:flex;padding:10px;background:#fff;gap:10px;position:sticky;bottom:0;}
        .input-area input{flex:1;padding:10px;border:1px solid #ddd;border-radius:25px;}
        .input-area button{background:#00a884;border:none;color:#fff;padding:10px 20px;border-radius:25px;}
        .tab-content{display:none;height:100%;}
        .tab-content.active{display:block;}
        .empty{padding:40px;text-align:center;color:#999;}
        .channel-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer;}
        .channel-item:hover{background:#f5f5f5;}
    </style>
</head>
<body>
<div style="display:flex;height:100vh;">
    <div class="panel-left" id="panelLeft">
        <div class="topbar"><h5>EvaMassage</h5><div><a href="/profile" class="text-white me-2"><i class="fas fa-user"></i></a><a href="/settings" class="text-white"><i class="fas fa-cog"></i></a></div></div>
        
        <div id="chatsTab" class="tab-content active">
            <div class="search"><input type="text" id="searchInput" placeholder="Search users..."></div>
            <div id="chatList"><div class="empty">No chats yet</div></div>
        </div>
        
        <div id="channelsTab" class="tab-content">
            <div class="search"><button class="btn btn-success w-100" onclick="showChannelModal()">+ New Channel</button></div>
            <div id="channelsList"><div class="empty">No channels</div></div>
        </div>
        
        <div id="settingsTab" class="tab-content">
            <div class="chat-item" onclick="location.href='/profile'"><div class="avatar"><i class="fas fa-user"></i></div><div>Edit Profile</div></div>
            <div class="chat-item" onclick="location.href='/settings'"><div class="avatar"><i class="fas fa-cog"></i></div><div>Settings</div></div>
            <div class="chat-item" onclick="logout()"><div class="avatar" style="background:#dc3545;"><i class="fas fa-sign-out-alt"></i></div><div>Logout</div></div>
        </div>
    </div>
    
    <div class="panel-right" id="panelRight">
        <div class="topbar"><span id="chatTitle">Select a chat</span><i class="fas fa-info-circle" onclick="openProfile()" style="cursor:pointer;"></i></div>
        <div class="messages-area" id="messagesArea"><div class="empty">Select a conversation</div></div>
        <div class="input-area"><input type="text" id="msgInput" placeholder="Type a message..."><button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button></div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('chats')"><i class="fas fa-comment-dots"></i>Chats</button>
    <button class="nav-item" onclick="switchTab('channels')"><i class="fas fa-hashtag"></i>Channels</button>
    <button class="nav-item" onclick="switchTab('settings')"><i class="fas fa-user"></i>Profile</button>
</div>

<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5>Create Channel</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><input type="text" id="channelName" class="form-control mb-2" placeholder="Channel name"><textarea id="channelDesc" class="form-control" placeholder="Description"></textarea></div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="createChannel()">Create</button></div>
    </div></div>
</div>

<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-primary text-white"><h5>Profile</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body text-center">
            <div class="avatar" style="width:80px;height:80px;font-size:2rem;margin:0 auto;">👤</div>
            <h4 id="pName">-</h4>
            <p id="pUsername">-</p>
            <p id="pBio">-</p>
            <button class="btn btn-success" onclick="sendFromProfile()">Send Message</button>
        </div>
    </div></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentId=null, currentType='user', currentName='', timer=null, profileId=null;
const ME = {{ user.user_id }};

function switchTab(tab){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    document.getElementById(tab+'Tab').classList.add('active');
    event.target.classList.add('active');
    if(tab=='chats') loadChats();
    if(tab=='channels') loadChannels();
}

function loadChats(){
    $.get('/api/chats',function(data){
        let html='';
        if(!data.length) html='<div class="empty">No chats</div>';
        else data.forEach(c=>{
            html+=`<div class="chat-item"><div onclick="selectChat(${c.user_id},'${c.full_name}','user')" style="flex:1;display:flex;gap:10px;"><div class="avatar">${c.full_name.charAt(0)}</div><div><b>${c.full_name}</b><br><small>${c.last_message?c.last_message.substring(0,30):'Tap to chat'}</small></div></div><button class="btn btn-sm" onclick="viewProfile(${c.user_id},'${c.full_name}')"><i class="fas fa-info-circle"></i></button></div>`;
        });
        $('#chatList').html(html);
    });
}

function loadChannels(){
    $.get('/api/channels',function(data){
        let html='';
        if(!data.length) html='<div class="empty">No channels</div>';
        else data.forEach(c=>{
            html+=`<div class="channel-item" onclick="selectChat('${c.id}','${c.name}','channel')"><i class="fas fa-hashtag"></i> ${c.name} <span class="badge bg-secondary">${c.member_count}</span></div>`;
        });
        $('#channelsList').html(html);
    });
}

function selectChat(id,name,type){
    currentId=id; currentType=type; currentName=name;
    $('#chatTitle').text(name);
    if(type=='user'){ loadMsgs(); if(timer)clearInterval(timer); timer=setInterval(loadMsgs,3000); }
    else{ loadChannelMsgs(); if(timer)clearInterval(timer); timer=setInterval(loadChannelMsgs,3000); }
    if(window.innerWidth<=768){ $('#panelLeft').hide(); $('#panelRight').css('width','100%'); }
}

function loadMsgs(){
    if(!currentId||currentType!='user') return;
    $.get('/api/messages/'+currentId,function(msgs){
        let html='';
        if(!msgs.length) html='<div class="empty">No messages</div>';
        else msgs.forEach(m=>{
            let sent=m.from_id===ME;
            html+=`<div class="msg ${sent?'sent':'recv'}">${m.message}<br><small>${new Date(m.created_at).toLocaleTimeString()}</small></div>`;
        });
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

function loadChannelMsgs(){
    if(!currentId||currentType!='channel') return;
    $.get('/api/channels/'+currentId+'/messages',function(msgs){
        let html='';
        if(!msgs.length) html='<div class="empty">No messages</div>';
        else msgs.forEach(m=>{
            let sent=m.from_id===ME;
            html+=`<div class="msg ${sent?'sent':'recv'}"><b>${m.from_name}</b><br>${m.message}<br><small>${new Date(m.created_at).toLocaleTimeString()}</small></div>`;
        });
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

function sendMsg(){
    let msg=$('#msgInput').val().trim();
    if(!msg||!currentId) return;
    $('#msgInput').val('');
    if(currentType=='user'){
        $.post('/api/messages/send',JSON.stringify({to_id:currentId,message:msg}),function(r){
            if(r.success){ loadMsgs(); loadChats(); }
            else alert(r.error);
        });
    } else {
        $.post('/api/channels/'+currentId+'/send',JSON.stringify({message:msg}),function(r){
            if(r.success) loadChannelMsgs();
            else alert(r.error);
        });
    }
}

function createChannel(){
    let name=$('#channelName').val().trim();
    if(!name){ alert('Enter channel name'); return; }
    $.post('/api/channels',JSON.stringify({name:name,description:$('#channelDesc').val()}),function(r){
        if(r.success){
            $('#channelModal').modal('hide');
            $('#channelName,#channelDesc').val('');
            loadChannels();
            switchTab('channels');
            alert('Channel created!');
        } else alert(r.error);
    });
}

function viewProfile(id,name){
    profileId=id;
    $('#pName').text(name);
    $.get('/api/users/profile/'+id,function(p){
        $('#pName').text(p.full_name||name);
        $('#pUsername').text('@'+(p.username||''));
        $('#pBio').text(p.bio||'No bio');
    });
    $('#profileModal').modal('show');
}

function sendFromProfile(){
    if(profileId){
        $('#profileModal').modal('hide');
        $.get('/api/users/profile/'+profileId,function(p){
            selectChat(profileId,p.full_name,'user');
        });
    }
}

function openProfile(){
    if(currentId&&currentType=='user') viewProfile(currentId,currentName);
}

function logout(){ if(confirm('Logout?')) window.location.href='/logout'; }
function showChannelModal(){ $('#channelModal').modal('show'); }

// Search users
let st;
$('#searchInput').on('input',function(){
    let q=$(this).val().trim();
    clearTimeout(st);
    if(q.length<2) return;
    st=setTimeout(()=>{
        $.get('/api/users/search',{q:q},function(users){
            let html='';
            users.forEach(u=>{
                html+=`<div class="chat-item" onclick="selectChat(${u.user_id},'${u.full_name}','user');$('#searchInput').val('')"><div class="avatar">${u.full_name.charAt(0)}</div><div><b>${u.full_name}</b><br><small>@${u.username}</small></div></div>`;
            });
            $('#chatList').html(html);
        });
    },300);
});

$(function(){ loadChats(); setInterval(loadChats,10000); });
</script>
</body>
</html>
