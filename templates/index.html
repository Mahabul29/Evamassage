<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#f0f2f5;}
        
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;padding:10px;border-top:1px solid #ddd;z-index:100;}
        .nav-item{flex:1;text-align:center;background:none;border:none;padding:8px;color:#666;cursor:pointer;}
        .nav-item.active{color:#00a884;}
        .nav-item i{font-size:22px;display:block;margin-bottom:4px;}
        
        .panel-left{width:350px;background:#fff;height:100vh;overflow-y:auto;border-right:1px solid #ddd;padding-bottom:70px;}
        .panel-right{flex:1;background:#efeae2;height:100vh;display:flex;flex-direction:column;}
        
        .topbar{background:#075e54;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;}
        .topbar h5{margin:0;}
        
        .search{padding:10px;background:#fff;border-bottom:1px solid #eee;}
        .search input{width:100%;padding:10px;border:1px solid #ddd;border-radius:25px;outline:none;}
        
        .chat-item{display:flex;padding:12px 15px;border-bottom:1px solid #eee;cursor:pointer;align-items:center;gap:12px;}
        .chat-item:hover{background:#f5f5f5;}
        .avatar{width:50px;height:50px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:18px;}
        
        .messages-area{flex:1;overflow-y:auto;padding:15px;padding-bottom:80px;}
        .msg{max-width:70%;margin-bottom:10px;padding:8px 12px;border-radius:18px;word-break:break-word;}
        .msg.sent{background:#dcf8c5;margin-left:auto;text-align:right;}
        .msg.recv{background:#fff;}
        .msg-name{font-size:12px;color:#075e54;font-weight:bold;margin-bottom:4px;}
        .msg-time{font-size:10px;color:#999;margin-top:4px;}
        
        .input-area{display:flex;padding:10px;background:#fff;gap:10px;position:sticky;bottom:0;border-top:1px solid #eee;}
        .input-area input{flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;outline:none;}
        .input-area button{background:#00a884;border:none;color:#fff;padding:12px 20px;border-radius:25px;cursor:pointer;}
        
        .tab-content{display:none;height:100%;}
        .tab-content.active{display:block;}
        .empty{padding:50px;text-align:center;color:#999;}
        .channel-item{padding:15px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
        .channel-item:hover{background:#f5f5f5;}
        
        @media(max-width:768px){
            .panel-left{position:fixed;left:0;top:0;z-index:10;transform:translateX(0);transition:transform 0.3s;}
            .panel-left.hide{transform:translateX(-100%);}
            .panel-right{width:100%;}
        }
    </style>
</head>
<body>
<div style="display:flex;height:100vh;">
    <div class="panel-left" id="panelLeft">
        <div class="topbar"><h5><i class="fas fa-comment-dots"></i> EvaMassage</h5><div><a href="/profile" class="text-white me-2"><i class="fas fa-user"></i></a><a href="/settings" class="text-white"><i class="fas fa-cog"></i></a></div></div>
        
        <div id="chatsTab" class="tab-content active">
            <div class="search"><input type="text" id="searchInput" placeholder="Search users..."></div>
            <div id="chatList"><div class="empty"><i class="fas fa-comments fa-3x mb-2 d-block"></i>No chats yet</div></div>
        </div>
        
        <div id="channelsTab" class="tab-content">
            <div class="search"><button class="btn btn-success w-100" onclick="showChannelModal()"><i class="fas fa-plus"></i> Create Channel</button></div>
            <div id="channelsList"><div class="empty"><i class="fas fa-hashtag fa-3x mb-2 d-block"></i>No channels</div></div>
        </div>
        
        <div id="settingsTab" class="tab-content">
            <div class="chat-item" onclick="location.href='/profile'"><div class="avatar"><i class="fas fa-user"></i></div><div><b>Edit Profile</b><br><small>Update your info</small></div></div>
            <div class="chat-item" onclick="location.href='/settings'"><div class="avatar"><i class="fas fa-cog"></i></div><div><b>Settings</b><br><small>App preferences</small></div></div>
            <div class="chat-item" onclick="logout()"><div class="avatar" style="background:#dc3545;"><i class="fas fa-sign-out-alt"></i></div><div><b style="color:#dc3545;">Logout</b><br><small>Sign out</small></div></div>
        </div>
    </div>
    
    <div class="panel-right" id="panelRight">
        <div class="topbar"><span id="chatTitle"><i class="fas fa-comment"></i> Select a chat</span><i class="fas fa-info-circle" onclick="openProfile()" style="cursor:pointer;"></i></div>
        <div class="messages-area" id="messagesArea"><div class="empty"><i class="fas fa-comment-dots fa-3x mb-2 d-block"></i>Select a conversation to start messaging</div></div>
        <div class="input-area"><input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter')sendMsg()"><button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button></div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('chats')"><i class="fas fa-comment-dots"></i><span>Chats</span></button>
    <button class="nav-item" onclick="switchTab('channels')"><i class="fas fa-hashtag"></i><span>Channels</span></button>
    <button class="nav-item" onclick="switchTab('settings')"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<!-- Channel Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white"><h5><i class="fas fa-hashtag"></i> Create Channel</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="channelName" class="form-control mb-3" placeholder="Channel name" style="padding:12px;border-radius:10px;">
                <textarea id="channelDesc" class="form-control" placeholder="Description (optional)" rows="3" style="border-radius:10px;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" onclick="createChannel()">Create</button>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5><i class="fas fa-user-circle"></i> Profile</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center">
                <div class="avatar" style="width:80px;height:80px;font-size:2rem;margin:0 auto 15px;">👤</div>
                <h4 id="pName">-</h4>
                <p class="text-muted" id="pUsername">@-</p>
                <p id="pBio" style="padding:10px;background:#f5f5f5;border-radius:10px;">-</p>
                <button class="btn btn-success w-100" onclick="sendFromProfile()"><i class="fas fa-paper-plane"></i> Send Message</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentId = null;
let currentType = 'user';
let currentName = '';
let msgTimer = null;
let profileId = null;
const ME = {{ user.user_id }};

// Switch tabs
function switchTab(tab){
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    event.target.classList.add('active');
    if(tab == 'chats') loadChats();
    if(tab == 'channels') loadChannels();
}

// Load chats
function loadChats(){
    $.get('/api/chats', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty"><i class="fas fa-comments fa-3x mb-2 d-block"></i>No chats yet<br><small>Search for people above</small></div>';
        } else {
            data.forEach(c => {
                html += `<div class="chat-item">
                    <div onclick="selectChat(${c.user_id},'${escapeHtml(c.full_name)}','user')" style="flex:1;display:flex;gap:12px;">
                        <div class="avatar">${escapeHtml(c.full_name.charAt(0).toUpperCase())}</div>
                        <div><b>${escapeHtml(c.full_name)}</b><br><small>${c.last_message ? escapeHtml(c.last_message.substring(0,30)) : 'Tap to chat'}</small></div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="viewProfile(${c.user_id},'${escapeHtml(c.full_name)}')" style="border-radius:50%;"><i class="fas fa-info-circle"></i></button>
                </div>`;
            });
        }
        $('#chatList').html(html);
    }).fail(function(){
        $('#chatList').html('<div class="empty">Error loading chats</div>');
    });
}

// Load channels
function loadChannels(){
    $.get('/api/channels', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty"><i class="fas fa-hashtag fa-3x mb-2 d-block"></i>No channels yet<br><button class="btn btn-sm btn-success mt-2" onclick="showChannelModal()">Create First Channel</button></div>';
        } else {
            data.forEach(c => {
                html += `<div class="channel-item" onclick="selectChat('${c.id}','${escapeHtml(c.name)}','channel')">
                    <div><i class="fas fa-hashtag"></i> <b>${escapeHtml(c.name)}</b><br><small>${c.description || 'No description'}</small></div>
                    <span class="badge bg-secondary">${c.member_count} members</span>
                </div>`;
            });
        }
        $('#channelsList').html(html);
    }).fail(function(){
        $('#channelsList').html('<div class="empty">Error loading channels</div>');
    });
}

// Select chat
function selectChat(id, name, type){
    currentId = id;
    currentType = type;
    currentName = name;
    $('#chatTitle').html('<i class="fas fa-comment"></i> ' + escapeHtml(name));
    
    if(type == 'user'){
        loadMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadMessages, 3000);
    } else {
        loadChannelMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadChannelMessages, 3000);
    }
    
    if(window.innerWidth <= 768){
        $('#panelLeft').addClass('hide');
    }
}

// Load private messages
function loadMessages(){
    if(!currentId || currentType != 'user') return;
    $.get('/api/messages/' + currentId, function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty"><i class="fas fa-comment-dots fa-3x mb-2 d-block"></i>No messages yet<br><small>Say hello!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = (m.from_id === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">
                    ${escapeHtml(m.message)}
                    <div class="msg-time">${formatTime(m.created_at)}</div>
                </div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// Load channel messages
function loadChannelMessages(){
    if(!currentId || currentType != 'channel') return;
    $.get('/api/channels/' + currentId + '/messages', function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty"><i class="fas fa-hashtag fa-3x mb-2 d-block"></i>No messages in channel<br><small>Be the first to message!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = (m.from_id === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">
                    ${!sent ? '<div class="msg-name">' + escapeHtml(m.from_name) + '</div>' : ''}
                    ${escapeHtml(m.message)}
                    <div class="msg-time">${formatTime(m.created_at)}</div>
                </div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// Send message
function sendMsg(){
    let msg = $('#msgInput').val().trim();
    if(!msg || !currentId) return;
    $('#msgInput').val('');
    
    if(currentType == 'user'){
        $.ajax({
            url: '/api/messages/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({to_id: currentId, message: msg}),
            success: function(r){
                if(r.success){
                    loadMessages();
                    loadChats();
                } else {
                    alert(r.error || 'Failed to send');
                    $('#msgInput').val(msg);
                }
            },
            error: function(){
                alert('Failed to send message');
                $('#msgInput').val(msg);
            }
        });
    } else {
        $.ajax({
            url: '/api/channels/' + currentId + '/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({message: msg}),
            success: function(r){
                if(r.success){
                    loadChannelMessages();
                } else {
                    alert(r.error || 'Failed to send');
                    $('#msgInput').val(msg);
                }
            },
            error: function(){
                alert('Failed to send message');
                $('#msgInput').val(msg);
            }
        });
    }
}

// Create channel
function createChannel(){
    let name = $('#channelName').val().trim();
    if(!name){
        alert('Please enter a channel name');
        return;
    }
    
    $.ajax({
        url: '/api/channels',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({name: name, description: $('#channelDesc').val()}),
        success: function(r){
            if(r.success){
                $('#channelModal').modal('hide');
                $('#channelName').val('');
                $('#channelDesc').val('');
                loadChannels();
                switchTab('channels');
                alert('Channel "' + r.name + '" created!');
            } else {
                alert(r.error || 'Failed to create channel');
            }
        },
        error: function(xhr){
            let error = 'Failed to create channel';
            if(xhr.responseJSON && xhr.responseJSON.error) error = xhr.responseJSON.error;
            alert(error);
        }
    });
}

// View profile
function viewProfile(id, name){
    profileId = id;
    $('#pName').text(name);
    $('#pUsername').text('@loading...');
    $('#pBio').text('Loading...');
    
    $.get('/api/users/profile/' + id, function(p){
        $('#pName').text(p.full_name || name);
        $('#pUsername').text('@' + (p.username || ''));
        $('#pBio').text(p.bio || 'No bio available');
    }).fail(function(){
        $('#pBio').text('Could not load profile');
    });
    
    $('#profileModal').modal('show');
}

// Send from profile
function sendFromProfile(){
    if(profileId){
        $('#profileModal').modal('hide');
        $.get('/api/users/profile/' + profileId, function(p){
            selectChat(profileId, p.full_name, 'user');
        }).fail(function(){
            selectChat(profileId, 'User', 'user');
        });
    }
}

// Open current chat profile
function openProfile(){
    if(currentId && currentType == 'user'){
        viewProfile(currentId, currentName);
    }
}

// Go back on mobile
function goBack(){
    $('#panelLeft').removeClass('hide');
}

// Logout
function logout(){
    if(confirm('Are you sure you want to logout?')){
        window.location.href = '/logout';
    }
}

// Show channel modal
function showChannelModal(){
    $('#channelModal').modal('show');
}

// Search users
let searchTimer;
$('#searchInput').on('input', function(){
    let q = $(this).val().trim();
    clearTimeout(searchTimer);
    if(q.length < 2){
        loadChats();
        return;
    }
    searchTimer = setTimeout(() => {
        $.get('/api/users/search', {q: q}, function(users){
            let html = '';
            if(!users || users.length === 0){
                html = '<div class="empty">No users found</div>';
            } else {
                users.forEach(u => {
                    html += `<div class="chat-item" onclick="selectChat(${u.user_id},'${escapeHtml(u.full_name)}','user');$('#searchInput').val('');loadChats();">
                        <div class="avatar">${escapeHtml(u.full_name.charAt(0).toUpperCase())}</div>
                        <div><b>${escapeHtml(u.full_name)}</b><br><small>@${escapeHtml(u.username)}</small></div>
                    </div>`;
                });
            }
            $('#chatList').html(html);
        });
    }, 300);
});

// Utils
function escapeHtml(t){
    if(!t) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatTime(s){
    try{
        let d = new Date(s);
        if(isNaN(d)) return '';
        let now = new Date();
        if(d.toDateString() === now.toDateString()){
            return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
        return d.toLocaleDateString([], {month:'short', day:'numeric'});
    } catch(e){
        return '';
    }
}

// Handle back button on mobile
$(document).on('click', '.back-btn', goBack);

// Initial load
$(function(){
    loadChats();
    setInterval(loadChats, 10000);
    
    // Check for mobile back button
    if(window.innerWidth <= 768){
        $('.panel-left').after('<button class="back-btn" style="position:fixed;top:10px;left:10px;z-index:100;background:#075e54;color:#fff;border:none;padding:10px 15px;border-radius:25px;display:none;"><i class="fas fa-arrow-left"></i> Back</button>');
    }
});
</script>
</body>
</html>
