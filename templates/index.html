<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .chat-container {
            height: 100vh;
            display: flex;
            background: white;
            margin: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            background: #6c5ce7;
            color: white;
        }
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover {
            background: #f5f6fa;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f6fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message.received {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 20px;
        }
        .message.sent .message-content {
            background: #6c5ce7;
            color: white;
        }
        .message.received .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .search-results {
            position: absolute;
            background: white;
            width: 90%;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #6c5ce7;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h4><i class="fas fa-comment-dots"></i> EvaMassage</h4>
                <small>Welcome, {{ user.full_name }}</small>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search people...">
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="text-center text-muted p-3">Loading chats...</div>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <h5 id="chatUserName" class="mb-0">Select a chat</h5>
                    <small class="text-muted">Click on a contact to start messaging</small>
                </div>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="text-center text-muted mt-5">
                    <i class="fas fa-comments fa-3x mb-3"></i>
                    <p>Select a conversation to start messaging</p>
                </div>
            </div>
            <div class="chat-input">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let currentChatId = null;
        
        function loadChats() {
            $.get('/api/chats', function(chats) {
                let html = '';
                chats.forEach(chat => {
                    html += `<div class="chat-item" onclick="loadChat(${chat.user_id})">
                        <div class="d-flex align-items-center">
                            <div class="avatar me-2">${chat.full_name.charAt(0)}</div>
                            <div>
                                <strong>${chat.full_name}</strong><br>
                                <small>@${chat.username}</small>
                            </div>
                        </div>
                    </div>`;
                });
                if(html === '') html = '<div class="text-center p-3">No chats yet. Search for people!</div>';
                $('#chatList').html(html);
            });
        }
        
        function loadChat(userId) {
            currentChatId = userId;
            $.get(`/api/users/profile/${userId}`, function(profile) {
                $('#chatUserName').text(profile.full_name);
                loadMessages(userId);
            });
        }
        
        function loadMessages(userId) {
            $.get(`/api/messages/${userId}`, function(messages) {
                let html = '';
                messages.forEach(msg => {
                    const isSent = msg.from_id === {{ user.user_id }};
                    html += `<div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-content">
                            ${escapeHtml(msg.message)}
                            <div class="small">${new Date(msg.created_at).toLocaleTimeString()}</div>
                        </div>
                    </div>`;
                });
                $('#messagesArea').html(html);
                scrollToBottom();
            });
        }
        
        function sendMessage() {
            const message = $('#messageInput').val();
            if(message && currentChatId) {
                $.post('/api/messages/send', {to_id: currentChatId, message: message}, function() {
                    $('#messageInput').val('');
                    loadMessages(currentChatId);
                });
            }
        }
        
        $('#searchInput').on('input', function() {
            const query = $(this).val();
            if(query.length > 1) {
                $.get(`/api/users/search?q=${query}`, function(users) {
                    let html = '';
                    users.forEach(user => {
                        html += `<div class="p-2 border-bottom" style="cursor:pointer" onclick="startChat(${user.user_id})">
                            <strong>${user.full_name}</strong><br>
                            <small>@${user.username}</small>
                        </div>`;
                    });
                    $('#searchResults').html(html).show();
                });
            } else {
                $('#searchResults').hide();
            }
        });
        
        function startChat(userId) {
            $('#searchInput').val('');
            $('#searchResults').hide();
            loadChat(userId);
            loadChats();
        }
        
        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            area.scrollTop = area.scrollHeight;
        }
        
        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        setInterval(() => { if(currentChatId) loadMessages(currentChatId); }, 3000);
        $('#messageInput').on('keypress', function(e) { if(e.which === 13) sendMessage(); });
        
        loadChats();
    </script>
</body>
</html>
