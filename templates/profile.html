<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .profile-card {
            max-width: 500px;
            margin: 50px auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            color: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card profile-card">
            <div class="card-body p-4">
                <div class="text-center">
                    <div class="avatar-large">
                        {{ profile.full_name[0].upper() if profile.full_name else profile.username[0].upper() }}
                    </div>
                    <h3>{{ profile.full_name }}</h3>
                    <p class="text-muted">@{{ profile.username }}</p>
                </div>
                
                <form id="profileForm">
                    <div class="mb-3">
                        <label>Full Name</label>
                        <input type="text" id="fullName" class="form-control" value="{{ profile.full_name }}">
                    </div>
                    <div class="mb-3">
                        <label>Bio</label>
                        <textarea id="bio" class="form-control" rows="3">{{ profile.bio }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label>Joined</label>
                        <input type="text" class="form-control" value="{{ profile.joned }}" disabled>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Profile
                        </button>
                        <a href="/dashboard" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Chat
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#profileForm').on('submit', function(e) {
            e.preventDefault();
            $.post('/api/users/update_profile', {
                full_name: $('#fullName').val(),
                bio: $('#bio').val()
            }, function(response) {
                if (response.success) {
                    alert('Profile updated!');
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + response.error);
                }
            });
        });
    </script>
</body>
</html>
