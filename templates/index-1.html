<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EvaMassage - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
            background: white;
        }
        
        /* Sidebar */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .sidebar-header h4 {
            margin: 0;
            font-size: 1.3rem;
        }
        
        .sidebar-header small {
            opacity: 0.9;
            font-size: 0.8rem;
        }
        
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-btn {
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.2);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .header-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        /* Search Box */
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-results {
            position: absolute;
            top: 70px;
            left: 15px;
            right: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .search-result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-result-item:hover {
            background: #f5f6fa;
        }
        
        /* Chat List */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: #f5f6fa;
        }
        
        .chat-item.active {
            background: #e8eaf6;
        }
        
        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
            min-width: 0;
        }
        
        .chat-header {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .chat-info h5 {
            margin: 0;
            font-size: 1.1rem;
        }
        
        .chat-info small {
            font-size: 0.75rem;
            color: #6c757d;
        }
        
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        
        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message.received {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.sent .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-content {
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .chat-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .mobile-menu-btn, .back-button {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px 10px;
            color: #667eea;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .avatar-small {
            width: 40px;
            height: 40px;
            font-size: 1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        
        /* Profile Modal */
        .profile-modal .modal-content {
            border-radius: 20px;
        }
        
        .profile-modal .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            color: white;
        }
        
        .btn-chat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            width: 100%;
        }
        
        /* =============================================
           DESKTOP: always show sidebar (BUG FIX)
           ============================================= */
        @media (min-width: 769px) {
            .sidebar {
                position: relative !important;
                transform: translateX(0) !important;
                width: 320px !important;
                min-width: 320px !important;
                display: flex !important;
            }
            .back-button, .mobile-menu-btn {
                display: none !important;
            }
        }

        /* =============================================
           MOBILE
           ============================================= */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                max-width: 280px;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
                z-index: 1000;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-chat {
                width: 100%;
            }
            
            .back-button, .mobile-menu-btn {
                display: block !important;
            }
            
            .message-content {
                max-width: 85% !important;
            }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        
        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h4><i class="fas fa-comment-dots"></i> EvaMassage</h4>
                        <small>Welcome, {{ user.full_name }}</small>
                    </div>
                    <div class="header-buttons">
                        <a href="/profile" class="header-btn" title="My Profile">
                            <i class="fas fa-user-circle"></i>
                        </a>
                        <a href="/settings" class="header-btn" title="Settings">
                            <i class="fas fa-cog"></i>
                        </a>
                        <button class="btn btn-sm btn-light" onclick="closeSidebar()" id="closeSidebarBtn" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search people by name...">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="chat-list" id="chatList">
                <div class="empty-state">
                    <i class="fas fa-users"></i>
                    <p>No chats yet</p>
                    <small>Search for people to start messaging!</small>
                </div>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="back-button" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="chat-info" id="chatInfo" style="cursor: pointer;" onclick="viewProfile()">
                        <div class="chat-header-avatar" id="chatAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div>
                            <h5 id="chatUserName">Select a chat</h5>
                            <small id="chatStatus"><span class="online-dot"></span> Click to start</small>
                        </div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>Select a conversation to start messaging</p>
                </div>
            </div>
            
            <div class="chat-input">
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Profile Modal -->
    <div class="modal fade profile-modal" id="profileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">User Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="profileModalBody">
                    <div class="text-center">
                        <div class="profile-avatar" id="modalAvatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <h4 id="modalName">Loading...</h4>
                        <p class="text-muted" id="modalUsername">@username</p>
                        <p id="modalBio">No bio available</p>
                        <hr>
                        <small class="text-muted" id="modalJoined">Joined: </small>
                        <div class="mt-3">
                            <button class="btn-chat" onclick="startChatFromModal()">
                                <i class="fas fa-comment"></i> Send Message
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentChatId = null;
        let currentChatName = '';
        let currentChatUsername = '';
        let refreshInterval = null;
        let searchTimeout = null;
        let profileUserId = null;
        const currentUserId = {{ user.user_id }};
        
        // ── Sidebar ──────────────────────────────────────
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            if (window.innerWidth <= 768) {
                document.getElementById('closeSidebarBtn').style.display =
                    sidebar.classList.contains('open') ? 'block' : 'none';
            }
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('closeSidebarBtn').style.display = 'none';
        }
        
        function goBack() {
            currentChatId = null;
            document.getElementById('chatUserName').innerText = 'Select a chat';
            document.getElementById('chatStatus').innerHTML = '<span class="online-dot"></span> Click to start';
            document.getElementById('chatAvatar').innerHTML = '<i class="fas fa-user"></i>';
            document.getElementById('messagesArea').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>Select a conversation to start messaging</p>
                </div>`;
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
            if (window.innerWidth <= 768) { toggleSidebar(); }
        }
        
        // ── Load Chat List ────────────────────────────────
        function loadChats() {
            $.get('/api/chats', function(chats) {
                let html = '';
                if (!chats || chats.length === 0) {
                    html = `<div class="empty-state">
                                <i class="fas fa-users"></i>
                                <p>No chats yet</p>
                                <small>Search for people to start messaging!</small>
                            </div>`;
                } else {
                    chats.forEach(chat => {
                        const isActive = currentChatId === chat.user_id;
                        const initials = escapeHtml(chat.full_name.charAt(0).toUpperCase());
                        const lastMsg = chat.last_message
                            ? `<div style="font-size:0.7rem;color:#999;margin-top:3px;">${escapeHtml(chat.last_message.substring(0,35))}${chat.last_message.length > 35 ? '...' : ''}</div>`
                            : '';
                        html += `
                            <div class="chat-item ${isActive ? 'active' : ''}"
                                 onclick="selectChat(${chat.user_id}, '${escapeHtml(chat.full_name)}', '${escapeHtml(chat.username)}')">
                                <div style="display:flex;align-items:center;gap:12px;">
                                    <div class="avatar avatar-small">${initials}</div>
                                    <div style="flex:1;min-width:0;">
                                        <div style="font-weight:500;">${escapeHtml(chat.full_name)}</div>
                                        <div style="font-size:0.75rem;color:#6c757d;">@${escapeHtml(chat.username)}</div>
                                        ${lastMsg}
                                    </div>
                                </div>
                            </div>`;
                    });
                }
                $('#chatList').html(html);
            }).fail(function() {
                console.error('Failed to load chats');
            });
        }
        
        // ── Select Chat ───────────────────────────────────
        function selectChat(userId, userName, username) {
            currentChatId = userId;
            currentChatName = userName;
            currentChatUsername = username;
            
            document.getElementById('chatUserName').innerText = userName;
            document.getElementById('chatStatus').innerHTML =
                `<span class="online-dot"></span> @${escapeHtml(username)}`;
            document.getElementById('chatAvatar').innerText =
                userName.charAt(0).toUpperCase();
            
            // Mark messages read
            $.post('/api/messages/mark_read', JSON.stringify({ user_id: userId }), null, 'json');
            
            loadMessages();
            loadChats();
            
            // Auto-refresh messages every 3 seconds
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(loadMessages, 3000);
            
            // On mobile: hide sidebar, show chat
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }
        
        // ── Load Messages ─────────────────────────────────
        function loadMessages() {
            if (!currentChatId) return;
            $.get(`/api/messages/${currentChatId}`, function(messages) {
                const area = document.getElementById('messagesArea');
                if (!messages || messages.length === 0) {
                    area.innerHTML = `<div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>No messages yet. Say hello!</p>
                    </div>`;
                    return;
                }
                let html = '';
                messages.forEach(msg => {
                    const isSent = msg.from_id === currentUserId;
                    const time = msg.created_at ? formatTime(msg.created_at) : '';
                    html += `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div class="message-content">
                                ${escapeHtml(msg.message)}
                                <div class="message-time">${time}</div>
                            </div>
                        </div>`;
                });
                area.innerHTML = html;
                area.scrollTop = area.scrollHeight;
            }).fail(function() {
                console.error('Failed to load messages');
            });
        }
        
        // ── Send Message ──────────────────────────────────
        function sendMessage() {
            if (!currentChatId) {
                alert('Please select a conversation first.');
                return;
            }
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            input.value = '';
            input.disabled = true;
            
            $.ajax({
                url: '/api/messages/send',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ to_id: currentChatId, message: message }),
                success: function(response) {
                    if (response.success) {
                        loadMessages();
                        loadChats();
                    } else {
                        alert('Failed to send message: ' + (response.error || 'Unknown error'));
                    }
                },
                error: function() {
                    alert('Failed to send message. Please try again.');
                },
                complete: function() {
                    input.disabled = false;
                    input.focus();
                }
            });
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        // ── Search Users ──────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', function() {
            const query = this.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 1) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(function() {
                $.get('/api/users/search', { q: query }, function(users) {
                    const resultsDiv = document.getElementById('searchResults');
                    if (!users || users.length === 0) {
                        resultsDiv.innerHTML = '<div style="padding:15px;text-align:center;color:#6c757d;">No users found</div>';
                    } else {
                        let html = '';
                        users.forEach(user => {
                            html += `
                                <div class="search-result-item"
                                     onclick="selectChat(${user.user_id}, '${escapeHtml(user.full_name)}', '${escapeHtml(user.username)}'); hideSearch();">
                                    <div class="avatar avatar-small">
                                        ${escapeHtml(user.full_name.charAt(0).toUpperCase())}
                                    </div>
                                    <div>
                                        <div style="font-weight:500;">${escapeHtml(user.full_name)}</div>
                                        <div style="font-size:0.8rem;color:#6c757d;">@${escapeHtml(user.username)}</div>
                                        ${user.bio ? `<div style="font-size:0.75rem;color:#999;">${escapeHtml(user.bio)}</div>` : ''}
                                    </div>
                                </div>`;
                        });
                        resultsDiv.innerHTML = html;
                    }
                    resultsDiv.style.display = 'block';
                }).fail(function() {
                    console.error('Search failed');
                });
            }, 300);
        });
        
        function hideSearch() {
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = '';
        }
        
        // Hide search results when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                document.getElementById('searchResults').style.display = 'none';
            }
        });
        
        // ── View Profile Modal ────────────────────────────
        function viewProfile() {
            if (!currentChatId) return;
            profileUserId = currentChatId;
            $.get(`/api/users/profile/${currentChatId}`, function(profile) {
                document.getElementById('modalName').innerText = profile.full_name || '';
                document.getElementById('modalUsername').innerText = '@' + (profile.username || '');
                document.getElementById('modalBio').innerText = profile.bio || 'No bio available';
                document.getElementById('modalAvatar').innerText =
                    (profile.full_name || '?').charAt(0).toUpperCase();
                document.getElementById('modalJoined').innerText =
                    'Joined: ' + (profile.joined ? formatTime(profile.joined) : 'Unknown');
                new bootstrap.Modal(document.getElementById('profileModal')).show();
            }).fail(function() {
                alert('Could not load profile.');
            });
        }
        
        function startChatFromModal() {
            bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
        }
        
        // ── Logout ────────────────────────────────────────
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/logout';
            }
        }
        
        // ── Utilities ─────────────────────────────────────
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        function formatTime(dateStr) {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';
                const now = new Date();
                const isToday = d.toDateString() === now.toDateString();
                if (isToday) {
                    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
                       d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch(e) {
                return '';
            }
        }
        
        // ── Init ──────────────────────────────────────────
        $(document).ready(function() {
            loadChats();
            // Refresh chat list every 10 seconds
            setInterval(loadChats, 10000);
        });
    </script>
</body>
</html>
