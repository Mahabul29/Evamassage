<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root{
            --bg:#f0f2f5;--sidebar:#fff;--chat-bg:#efeae2;
            --inp:#fff;--txt:#111;--sub:#666;--bdr:#e0e0e0;
            --recv:#fff;--sent:#dcf8c5;--hdr:#fff;--nav:#fff;
            --hov:#f5f5f5;--srch:#f0f2f5;--ph:#aaa;
        }
        body.dark{
            --bg:#111b21;--sidebar:#1f2c34;--chat-bg:#0b141a;
            --inp:#2a3942;--txt:#e9edef;--sub:#8696a0;--bdr:#2a3942;
            --recv:#202c33;--sent:#005c4b;--hdr:#1f2c34;--nav:#1f2c34;
            --hov:#2a3942;--srch:#111b21;--ph:#8696a0;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);overflow:hidden;color:var(--txt);transition:background .3s,color .3s;}

        /* BOTTOM NAV */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--nav);display:flex;padding:6px;border-top:1px solid var(--bdr);z-index:300;transition:background .3s;}
        .nav-btn{flex:1;text-align:center;background:none;border:none;padding:6px;color:var(--sub);cursor:pointer;transition:color .3s;}
        .nav-btn.active{color:#00a884;}
        .nav-btn i{font-size:22px;display:block;margin-bottom:2px;}

        /* INPUT - fixed above bottom nav, ALWAYS visible */
        .input-wrapper{position:fixed;bottom:60px;left:0;right:0;background:var(--nav);border-top:1px solid var(--bdr);padding:8px 12px;z-index:250;transition:background .3s;}
        .input-area{display:flex;gap:10px;align-items:center;}
        .input-area input{flex:1;padding:10px 16px;border:1px solid var(--bdr);border-radius:25px;outline:none;font-size:14px;background:var(--inp);color:var(--txt);}
        .input-area input::placeholder{color:var(--ph);}
        .input-area button{background:#00a884;border:none;color:#fff;padding:10px 18px;border-radius:25px;cursor:pointer;flex-shrink:0;}
        .input-area button:disabled{opacity:0.5;}

        /* LAYOUT */
        .main-container{display:flex;position:fixed;top:0;left:0;right:0;bottom:120px;overflow:hidden;}
        .sidebar{width:350px;background:var(--sidebar);height:100%;overflow-y:auto;border-right:1px solid var(--bdr);flex-shrink:0;transition:background .3s;}

        /* APP HEADER */
        #appHeader{background:var(--hdr);color:var(--txt);padding:14px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);transition:background .3s;}
        #themeBtn{background:none;border:1px solid var(--bdr);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--txt);transition:all .3s;}

        /* CHAT AREA */
        .chat-area{flex:1;background:var(--chat-bg);display:flex;flex-direction:column;height:100%;overflow:hidden;transition:background .3s;}
        .chat-header{background:#075e54;color:#fff;padding:14px 15px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
        body.dark .chat-header{background:#1f2c34;}
        .messages-container{flex:1;overflow-y:auto;padding:15px;-webkit-overflow-scrolling:touch;}

        /* SEARCH */
        .search-box{padding:10px;background:var(--sidebar);border-bottom:1px solid var(--bdr);}
        .search-box input{width:100%;padding:10px;border:1px solid var(--bdr);border-radius:25px;outline:none;background:var(--srch);color:var(--txt);}
        .search-box input::placeholder{color:var(--ph);}

        /* LIST ITEMS */
        .chat-item{display:flex;padding:12px 15px;border-bottom:1px solid var(--bdr);cursor:pointer;align-items:center;gap:12px;background:var(--sidebar);}
        .chat-item:hover{background:var(--hov);}
        .chat-item b{color:var(--txt);}
        .chat-item small{color:var(--sub);}
        .avatar{width:50px;height:50px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:18px;flex-shrink:0;}
        .channel-item{padding:15px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--sidebar);color:var(--txt);}
        .channel-item:hover{background:var(--hov);}
        .channel-item small{color:var(--sub);}
        .menu-item{padding:15px;border-bottom:1px solid var(--bdr);cursor:pointer;background:var(--sidebar);color:var(--txt);}
        .menu-item i{width:30px;}

        /* MESSAGES */
        .msg{max-width:75%;margin-bottom:10px;padding:8px 12px;border-radius:18px;word-break:break-word;}
        .msg.sent{background:var(--sent);margin-left:auto;text-align:right;color:var(--txt);}
        .msg.recv{background:var(--recv);color:var(--txt);}
        .msg-name{font-size:11px;color:#00a884;font-weight:bold;margin-bottom:3px;}
        .msg-time{font-size:10px;color:var(--sub);margin-top:3px;}

        .empty-state{padding:50px;text-align:center;color:var(--sub);}
        .empty-state i{font-size:48px;margin-bottom:15px;opacity:0.4;}
        .tab-content{display:none;height:100%;}
        .tab-content.active{display:block;}
        .back-btn{background:none;border:none;color:#fff;margin-right:10px;display:none;font-size:18px;}

        /* MOBILE */
        @media(max-width:768px){
            .sidebar{position:fixed;left:0;top:0;bottom:120px;z-index:200;transition:transform .3s,background .3s;width:100%;}
            .sidebar.hide{transform:translateX(-100%);}
            .chat-area{width:100%;}
            .back-btn{display:block !important;}
        }

        .modal-content{border-radius:15px;background:var(--sidebar);color:var(--txt);}
        .avatar-large{width:80px;height:80px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 15px;color:#fff;}
        .bio-box{padding:10px;background:var(--srch);border-radius:10px;color:var(--txt);}
        .install-popup{position:fixed;bottom:130px;left:10px;right:10px;background:var(--sidebar);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.3);z-index:1000;padding:16px;display:none;border:1px solid var(--bdr);}
        .install-content{display:flex;align-items:center;gap:12px;position:relative;}
        .install-icon{width:50px;height:50px;background:linear-gradient(135deg,#00a884,#075e54);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;}
        .install-text{flex:1;color:var(--txt);}
        .install-text h4{margin:0;font-size:16px;}
        .install-text p{margin:0;font-size:12px;color:var(--sub);}
        .install-btn{background:#00a884;border:none;color:#fff;padding:8px 16px;border-radius:25px;cursor:pointer;font-weight:600;}
        .close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);position:absolute;top:-5px;right:-5px;}

        /* ===== CALL UI ===== */
        /* Incoming call overlay */
        #incomingCallOverlay{
            display:none;position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.85);z-index:2000;
            flex-direction:column;align-items:center;justify-content:center;
            color:#fff;text-align:center;gap:20px;
        }
        #incomingCallOverlay.show{display:flex;}
        .call-avatar-ring{
            width:100px;height:100px;border-radius:50%;background:#00a884;
            display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;
            box-shadow:0 0 0 0 rgba(0,168,132,0.7);
            animation:pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring{
            0%{box-shadow:0 0 0 0 rgba(0,168,132,0.7);}
            70%{box-shadow:0 0 0 20px rgba(0,168,132,0);}
            100%{box-shadow:0 0 0 0 rgba(0,168,132,0);}
        }
        .call-action-btns{display:flex;gap:40px;margin-top:10px;}
        .call-action-btns button{
            width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
            font-size:22px;color:#fff;transition:transform .15s;
        }
        .call-action-btns button:active{transform:scale(0.9);}
        .btn-accept{background:#25d366;}
        .btn-reject{background:#e53935;}

        /* Active call screen */
        #activeCallScreen{
            display:none;position:fixed;top:0;left:0;right:0;bottom:0;
            background:#1a1a2e;z-index:2000;
            flex-direction:column;align-items:center;justify-content:space-between;
            padding:60px 20px 50px;color:#fff;text-align:center;
        }
        #activeCallScreen.show{display:flex;}
        #remoteVideo{
            position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.9;
            display:none;background:#000;
        }
        #localVideo{
            position:absolute;top:16px;right:16px;width:120px;height:160px;
            border-radius:12px;object-fit:cover;border:2px solid #00a884;
            display:none;background:#222;z-index:10;
        }
        .call-top{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:14px;}
        .call-bottom{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;}
        .call-timer{font-size:18px;color:#aaa;font-variant-numeric:tabular-nums;}
        .call-controls{display:flex;gap:24px;justify-content:center;}
        .ctrl-btn{
            width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
            background:rgba(255,255,255,0.15);color:#fff;font-size:20px;
            transition:background .2s,transform .15s;
        }
        .ctrl-btn:active{transform:scale(0.9);}
        .ctrl-btn.active{background:rgba(255,255,255,0.35);}
        .btn-end-call{background:#e53935;width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:24px;}

        /* Chat header call icons */
        .header-call-btns{display:flex;gap:12px;align-items:center;}
        .header-call-btns button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:background .2s;}
        .header-call-btns button:hover{background:rgba(255,255,255,0.15);}
    </style>
</head>
<body>
<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div id="appHeader">
            <div style="font-size:20px;font-weight:700;letter-spacing:0.5px;">EvaMassage</div>
            <button id="themeBtn" onclick="toggleTheme()">
                <i class="fas fa-moon" id="themeIcon"></i>
                <span id="themeLabel">Dark</span>
            </button>
        </div>
        
        <div id="chatsTab" class="tab-content active">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search users..."></div>
            <div id="chatList"><div class="empty-state"><i class="fas fa-comments"></i><br>No chats yet<br><small>Search for people above</small></div></div>
        </div>
        
        <div id="channelsTab" class="tab-content">
            <div class="search-box"><button class="btn btn-success w-100" onclick="showChannelModal()"><i class="fas fa-plus"></i> Create Channel</button></div>
            <div id="channelsList"><div class="empty-state"><i class="fas fa-hashtag"></i><br>No channels yet</div></div>
        </div>
        
        <div id="settingsTab" class="tab-content">
            <div class="menu-item" onclick="location.href='/profile'"><i class="fas fa-user-circle"></i> Edit Profile</div>
            <div class="menu-item" onclick="location.href='/settings'"><i class="fas fa-cog"></i> App Settings</div>
            <div class="menu-item text-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>
    
    <!-- Chat Area - FIXED with input always visible -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <span id="chatTitle" style="flex:1;cursor:pointer;" onclick="openProfile()">Select a chat</span>
            <div class="header-call-btns" id="headerCallBtns" style="display:none;">
                <button onclick="startCall('voice')" title="Voice call"><i class="fas fa-phone"></i></button>
                <button onclick="startCall('video')" title="Video call"><i class="fas fa-video"></i></button>
            </div>
            <i class="fas fa-info-circle" onclick="openProfile()" style="cursor:pointer;margin-left:8px;"></i>
        </div>
        
        <div class="messages-container" id="messagesArea">
            <div class="empty-state"><i class="fas fa-comment-dots"></i><br>Select a conversation to start</div>
        </div>
        
        <!-- INPUT AREA - Always visible at bottom -->
        <div class="input-wrapper">
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter')sendMsg()">
                <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('chats')"><i class="fas fa-comment-dots"></i><span>Chats</span></button>
    <button class="nav-btn" onclick="switchTab('channels')"><i class="fas fa-hashtag"></i><span>Channels</span></button>
    <button class="nav-btn" onclick="switchTab('settings')"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<!-- Channel Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white"><h5><i class="fas fa-hashtag"></i> Create Channel</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="channelName" class="form-control mb-3" placeholder="Channel name">
                <textarea id="channelDesc" class="form-control" placeholder="Description" rows="3"></textarea>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="createChannel()">Create</button></div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5><i class="fas fa-user-circle"></i> Profile</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center">
                <div class="avatar-large">👤</div>
                <h4 id="pName">-</h4>
                <p class="text-muted" id="pUsername">@-</p>
                <p id="pBio" class="bio-box">-</p>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-success flex-fill" onclick="sendFromProfile()"><i class="fas fa-paper-plane"></i> Message</button>
                    <button class="btn btn-outline-success" onclick="$('#profileModal').modal('hide');startCall('voice')" title="Voice call" style="width:50px;"><i class="fas fa-phone"></i></button>
                    <button class="btn btn-outline-primary" onclick="$('#profileModal').modal('hide');startCall('video')" title="Video call" style="width:50px;"><i class="fas fa-video"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Install Popup -->
<div id="installPopup" class="install-popup">
    <div class="install-content">
        <div class="install-icon">💬</div>
        <div class="install-text"><h4>EvaMassage</h4><p>Install app for better experience</p></div>
        <button onclick="installApp()" class="install-btn">Install</button>
        <button onclick="closeInstallPopup()" class="close-btn">&times;</button>
    </div>
</div>

<!-- ===== INCOMING CALL OVERLAY ===== -->
<div id="incomingCallOverlay">
    <div class="call-avatar-ring" id="incomingCallerAvatar">👤</div>
    <div>
        <div style="font-size:22px;font-weight:700;" id="incomingCallerName">Caller</div>
        <div style="color:#aaa;margin-top:4px;" id="incomingCallType">Incoming voice call…</div>
    </div>
    <div class="call-action-btns">
        <button class="btn-reject" onclick="rejectCall()" title="Decline"><i class="fas fa-phone-slash"></i></button>
        <button class="btn-accept" onclick="acceptCall()" title="Accept"><i class="fas fa-phone"></i></button>
    </div>
</div>

<!-- ===== ACTIVE CALL SCREEN ===== -->
<div id="activeCallScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay playsinline muted></video>

    <div class="call-top">
        <div class="call-avatar-ring" style="animation:none;" id="activeCallAvatar">👤</div>
        <div style="font-size:20px;font-weight:700;" id="activeCallName">-</div>
        <div class="call-timer" id="callTimerDisplay">00:00</div>
    </div>

    <div class="call-bottom">
        <div class="call-controls">
            <button class="ctrl-btn" id="btnMute"       onclick="toggleMute()"     title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="btnSpeaker"    onclick="toggleSpeaker()"  title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="btnCamera"     onclick="toggleCamera()"   title="Camera" style="display:none;"><i class="fas fa-video"></i></button>
            <button class="ctrl-btn" id="btnFlip"       onclick="flipCamera()"     title="Flip" style="display:none;"><i class="fas fa-sync-alt"></i></button>
        </div>
        <button class="btn-end-call" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ========== VARIABLES ==========
let currentId = null;
let currentType = 'user';
let currentName = '';
let msgTimer = null;
let profileId = null;
let deferredPrompt = null;
const ME = {{ user.user_id }};

// ========== TAB SWITCH ==========
function switchTab(tab){
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    event.target.classList.add('active');
    if(tab == 'chats') loadChats();
    if(tab == 'channels') loadChannels();
}

// ========== CHATS ==========
function loadChats(){
    $.get('/api/chats', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty-state"><i class="fas fa-comments"></i><br>No chats yet<br><small>Search for people above</small></div>';
        } else {
            data.forEach(c => {
                html += `<div class="chat-item">
                    <div onclick="selectChat(${c.user_id},'${escapeHtml(c.full_name)}','user')" style="flex:1;display:flex;gap:12px;">
                        <div class="avatar">${escapeHtml(c.full_name.charAt(0).toUpperCase())}</div>
                        <div><b>${escapeHtml(c.full_name)}</b><br><small>${c.last_message ? escapeHtml(c.last_message.substring(0,30)) : 'Tap to chat'}</small></div>
                    </div>
                    <button class="btn btn-sm" onclick="viewProfile(${c.user_id},'${escapeHtml(c.full_name)}')"><i class="fas fa-info-circle"></i></button>
                </div>`;
            });
        }
        $('#chatList').html(html);
    });
}

// ========== CHANNELS ==========
function loadChannels(){
    $.get('/api/channels', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty-state"><i class="fas fa-hashtag"></i><br>No channels yet<br><button class="btn btn-sm btn-success mt-2" onclick="showChannelModal()">Create First Channel</button></div>';
        } else {
            data.forEach(c => {
                html += `<div class="channel-item" onclick="selectChat('${c.id}','${escapeHtml(c.name)}','channel')">
                    <div><i class="fas fa-hashtag"></i> <b>${escapeHtml(c.name)}</b><br><small>${escapeHtml(c.description) || 'No description'}</small></div>
                    <span class="badge bg-secondary">${c.member_count} members</span>
                </div>`;
            });
        }
        $('#channelsList').html(html);
    });
}

// ========== SELECT CHAT ==========
function selectChat(id, name, type){
    currentId = id;
    currentType = type;
    currentName = name;
    $('#chatTitle').html('<i class="fas fa-comment"></i> ' + escapeHtml(name));
    
    if(type == 'user'){
        loadMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadMessages, 3000);
    } else {
        loadChannelMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadChannelMessages, 3000);
    }
    
    if(window.innerWidth <= 768){
        $('#sidebar').addClass('hide');
    }
}

// ========== PRIVATE MESSAGES ==========
function loadMessages(){
    if(!currentId || currentType != 'user') return;
    $.get('/api/messages/' + currentId, function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty-state"><i class="fas fa-comment-dots"></i><br>No messages yet<br><small>Say hello!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = ((m.from_id || m.sender_id || m.user_id) === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">${escapeHtml(m.message)}<div class="msg-time">${formatTime(m.created_at)}</div></div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// ========== CHANNEL MESSAGES ==========
function loadChannelMessages(){
    if(!currentId || currentType != 'channel') return;
    $.get('/api/channels/' + currentId + '/messages', function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty-state"><i class="fas fa-hashtag"></i><br>No messages in channel<br><small>Be the first to message!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = ((m.from_id || m.sender_id || m.user_id) === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">
                    ${!sent ? '<div class="msg-name">' + escapeHtml(m.from_name) + '</div>' : ''}
                    ${escapeHtml(m.message)}
                    <div class="msg-time">${formatTime(m.created_at)}</div>
                </div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// ========== SEND MESSAGE ==========
function sendMsg(){
    let msg = $('#msgInput').val().trim();
    if(!msg){
        console.log("No message");
        return;
    }
    if(!currentId){
        alert("Please select a chat first");
        return;
    }
    
    let originalMsg = msg;
    $('#msgInput').val('');
    $('#msgInput').prop('disabled', true);
    
    if(currentType == 'user'){
        $.ajax({
            url: '/api/messages/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({to_id: currentId, message: msg}),
            success: function(r){
                if(r.success){
                    loadMessages();
                    loadChats();
                } else {
                    alert(r.error || 'Failed to send');
                    $('#msgInput').val(originalMsg);
                }
            },
            error: function(){ 
                alert('Failed to send'); 
                $('#msgInput').val(originalMsg);
            },
            complete: function(){ 
                $('#msgInput').prop('disabled', false); 
                $('#msgInput').focus(); 
            }
        });
    } else {
        $.ajax({
            url: '/api/channels/' + currentId + '/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({message: msg}),
            success: function(r){
                if(r.success){
                    loadChannelMessages();
                } else {
                    alert(r.error || 'Failed to send to channel');
                    $('#msgInput').val(originalMsg);
                }
            },
            error: function(){ 
                alert('Failed to send'); 
                $('#msgInput').val(originalMsg);
            },
            complete: function(){ 
                $('#msgInput').prop('disabled', false); 
                $('#msgInput').focus(); 
            }
        });
    }
}

function escapeHtml(t){
    if(!t) return '';
    return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatTime(s){
    try{
        let d = new Date(s);
        if(isNaN(d)) return '';
        let now = new Date();
        if(d.toDateString() === now.toDateString()){
            return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
        return d.toLocaleDateString([], {month:'short', day:'numeric'});
    } catch(e){ return ''; }
}

});

// ========== WEBRTC CALLING ==========
let pc = null;                  // RTCPeerConnection
let localStream = null;
let activeCallId = null;
let callRole = null;            // 'caller' | 'callee'
let callTimerInterval = null;
let callSeconds = 0;
let incomingCallId = null;
let incomingCallType = null;
let isMuted = false;
let isSpeakerOff = false;
let isCameraOff = false;
let facingMode = 'user';
let candidatePollTimer = null;
let statusPollTimer = null;
let incomingPollTimer = null;

const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// Show/hide header call buttons based on active user chat
function updateHeaderCallBtns(){
    if(currentId && currentType === 'user'){
        $('#headerCallBtns').show();
    } else {
        $('#headerCallBtns').hide();
    }
}

// Override selectChat to also update call buttons
const _origSelectChat = selectChat;
function selectChat(id, name, type){
    _origSelectChat(id, name, type);
    updateHeaderCallBtns();
    // Update chatTitle to show name as clickable (already done inline in loadChats)
    $('#chatTitle').html('<i class="fas fa-comment"></i> ' + escapeHtml(name));
}

// ── Start a call (caller side) ───────────────────────────────────────────────
async function startCall(type){
    if(!currentId || currentType !== 'user'){
        alert('Select a user chat first to call.');
        return;
    }
    callRole = 'caller';
    incomingCallType = type;

    // 1. Create call record on server
    const r = await fetch('/api/call/initiate', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({callee_id: currentId, call_type: type})
    }).then(r => r.json());

    if(!r.success){ alert('Could not start call'); return; }
    activeCallId = r.call_id;

    // 2. Show active call screen immediately
    showActiveCallScreen(currentName, type);

    // 3. Get local media
    try {
        localStream = await navigator.mediaDevices.getUserMedia(
            type === 'video' ? {video:{facingMode}, audio:true} : {audio:true}
        );
    } catch(e){
        alert('Could not access microphone/camera: ' + e.message);
        cleanupCall(); return;
    }

    if(type === 'video'){
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = 'block';
        document.getElementById('btnCamera').style.display = 'block';
        document.getElementById('btnFlip').style.display = 'block';
    }

    // 4. Create RTCPeerConnection & offer
    pc = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = e => {
        document.getElementById('remoteVideo').srcObject = e.streams[0];
        if(type === 'video') document.getElementById('remoteVideo').style.display = 'block';
    };
    pc.onicecandidate = e => {
        if(e.candidate){
            fetch('/api/call/' + activeCallId + '/candidate', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({candidate: e.candidate, role:'caller'})
            });
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await fetch('/api/call/' + activeCallId + '/offer', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({offer: pc.localDescription})
    });

    // 5. Poll for answer & status
    statusPollTimer = setInterval(async () => {
        if(!activeCallId) return;
        const st = await fetch('/api/call/' + activeCallId + '/status').then(r=>r.json());
        if(st.status === 'ended' || st.status === 'rejected'){
            alert(st.status === 'rejected' ? currentName + ' declined the call.' : 'Call ended.');
            cleanupCall(); return;
        }
        if(st.status === 'active' && pc && pc.remoteDescription === null){
            const ans = await fetch('/api/call/' + activeCallId + '/answer').then(r=>r.json());
            if(ans.answer){
                await pc.setRemoteDescription(new RTCSessionDescription(ans.answer));
                startCallTimer();
                pollCandidates('callee');
                clearInterval(statusPollTimer);
            }
        }
    }, 1500);
}

// ── Accept incoming call (callee side) ──────────────────────────────────────
async function acceptCall(){
    if(!incomingCallId) return;
    activeCallId = incomingCallId;
    callRole = 'callee';
    const type = incomingCallType;
    const callerName = document.getElementById('incomingCallerName').textContent;

    document.getElementById('incomingCallOverlay').classList.remove('show');
    showActiveCallScreen(callerName, type);

    // Accept on server
    await fetch('/api/call/' + activeCallId + '/accept', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});

    // Get local media
    try {
        localStream = await navigator.mediaDevices.getUserMedia(
            type === 'video' ? {video:{facingMode}, audio:true} : {audio:true}
        );
    } catch(e){ alert('Microphone/camera denied: ' + e.message); cleanupCall(); return; }

    if(type === 'video'){
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = 'block';
        document.getElementById('btnCamera').style.display = 'block';
        document.getElementById('btnFlip').style.display = 'block';
    }

    pc = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = e => {
        document.getElementById('remoteVideo').srcObject = e.streams[0];
        if(type === 'video') document.getElementById('remoteVideo').style.display = 'block';
    };
    pc.onicecandidate = e => {
        if(e.candidate){
            fetch('/api/call/' + activeCallId + '/candidate', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({candidate: e.candidate, role:'callee'})
            });
        }
    };

    // Get offer from server
    const offerData = await fetch('/api/call/' + activeCallId + '/offer').then(r=>r.json());
    if(!offerData.offer){ alert('No offer received'); cleanupCall(); return; }
    await pc.setRemoteDescription(new RTCSessionDescription(offerData.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await fetch('/api/call/' + activeCallId + '/answer', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({answer: pc.localDescription})
    });

    startCallTimer();
    pollCandidates('caller');
    incomingCallId = null;
}

function rejectCall(){
    if(incomingCallId){
        fetch('/api/call/' + incomingCallId + '/end', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({status:'rejected'})
        });
        incomingCallId = null;
    }
    document.getElementById('incomingCallOverlay').classList.remove('show');
}

function endCall(){
    if(activeCallId){
        fetch('/api/call/' + activeCallId + '/end', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({status:'ended'})
        });
    }
    cleanupCall();
}

function cleanupCall(){
    if(pc){ pc.close(); pc = null; }
    if(localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    clearInterval(callTimerInterval);
    clearInterval(statusPollTimer);
    clearInterval(candidatePollTimer);
    callTimerInterval = null; statusPollTimer = null; candidatePollTimer = null;
    activeCallId = null; callRole = null; callSeconds = 0;
    isMuted = false; isCameraOff = false; isSpeakerOff = false;

    document.getElementById('activeCallScreen').classList.remove('show');
    document.getElementById('incomingCallOverlay').classList.remove('show');
    document.getElementById('remoteVideo').srcObject = null;
    document.getElementById('remoteVideo').style.display = 'none';
    document.getElementById('localVideo').srcObject = null;
    document.getElementById('localVideo').style.display = 'none';
    document.getElementById('btnCamera').style.display = 'none';
    document.getElementById('btnFlip').style.display = 'none';
    document.getElementById('callTimerDisplay').textContent = '00:00';
    document.getElementById('btnMute').classList.remove('active');
    document.getElementById('btnCamera').classList.remove('active');
}

function showActiveCallScreen(name, type){
    document.getElementById('activeCallName').textContent = name;
    document.getElementById('activeCallAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('activeCallScreen').classList.add('show');
}

function startCallTimer(){
    callSeconds = 0;
    clearInterval(callTimerInterval);
    callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
        const s = String(callSeconds%60).padStart(2,'0');
        document.getElementById('callTimerDisplay').textContent = m + ':' + s;
    }, 1000);
}

function pollCandidates(fromRole){
    candidatePollTimer = setInterval(async () => {
        if(!activeCallId || !pc) return;
        const data = await fetch('/api/call/' + activeCallId + '/candidates?role=' + fromRole).then(r=>r.json());
        (data.candidates || []).forEach(c => {
            try{ pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){}
        });
    }, 1500);
}

// ── Call controls ────────────────────────────────────────────────────────────
function toggleMute(){
    if(!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    const btn = document.getElementById('btnMute');
    btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
    btn.classList.toggle('active', isMuted);
}

function toggleSpeaker(){
    isSpeakerOff = !isSpeakerOff;
    const rv = document.getElementById('remoteVideo');
    rv.muted = isSpeakerOff;
    const btn = document.getElementById('btnSpeaker');
    btn.innerHTML = isSpeakerOff ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    btn.classList.toggle('active', isSpeakerOff);
}

function toggleCamera(){
    if(!localStream) return;
    isCameraOff = !isCameraOff;
    localStream.getVideoTracks().forEach(t => t.enabled = !isCameraOff);
    const btn = document.getElementById('btnCamera');
    btn.innerHTML = isCameraOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
    btn.classList.toggle('active', isCameraOff);
}

async function flipCamera(){
    if(!localStream) return;
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    localStream.getVideoTracks().forEach(t => t.stop());
    try {
        const newStream = await navigator.mediaDevices.getUserMedia({video:{facingMode}, audio:false});
        const newTrack = newStream.getVideoTracks()[0];
        document.getElementById('localVideo').srcObject = new MediaStream([newTrack, ...localStream.getAudioTracks()]);
        if(pc){
            const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
            if(sender) await sender.replaceTrack(newTrack);
        }
        const audioTracks = localStream.getAudioTracks();
        localStream = new MediaStream([newTrack, ...audioTracks]);
    } catch(e){ console.error('Flip camera failed', e); }
}

// ── Poll for incoming calls ──────────────────────────────────────────────────
function startIncomingCallPoll(){
    incomingPollTimer = setInterval(async () => {
        if(activeCallId) return;  // Already in a call
        try {
            const data = await fetch('/api/call/incoming').then(r=>r.json());
            if(data && data.call_id){
                incomingCallId   = data.call_id;
                incomingCallType = data.call_type;
                document.getElementById('incomingCallerName').textContent = data.caller_name || 'Unknown';
                document.getElementById('incomingCallerAvatar').textContent = (data.caller_name || '?').charAt(0).toUpperCase();
                document.getElementById('incomingCallType').textContent =
                    'Incoming ' + (data.call_type === 'video' ? 'video' : 'voice') + ' call…';
                document.getElementById('incomingCallOverlay').classList.add('show');
            }
        } catch(e){}
    }, 2000);
}
