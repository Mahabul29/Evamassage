<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - {% block title %}Chat App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <meta name="theme-color" content="#00a884">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EvaMassage">

    <!-- ✅ FIXED: install.js loaded early with defer so beforeinstallprompt is never missed -->
    <script src="/static/js/install.js" defer></script>
</head>

<body>

    {% block content %}{% endblock %}

    <!-- Install Popup -->
    <div id="installPopup" style="display:none; position:fixed; bottom:20px; left:50%;
        transform:translateX(-50%); background:#1f2c34; color:#fff; padding:16px 20px;
        border-radius:12px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.4);
        text-align:center; width:90%; max-width:360px;">
        <p style="margin:0 0 12px; font-size:15px;">
            📲 Install <strong>EvaMassage</strong> for a better experience!
        </p>
        <button onclick="installApp()" style="background:#00a884; color:#fff; border:none;
            padding:8px 20px; border-radius:8px; margin-right:8px; cursor:pointer;">
            Install
        </button>
        <button onclick="closeInstallPopup()" style="background:#2a3942; color:#aaa;
            border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">
            Not now
        </button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(function (registration) {
                        console.log('Service Worker Registered:', registration.scope);
                    })
                    .catch(function (error) {
                        console.log('Service Worker Failed:', error);
                    });
            });
        }
    </script>

</body>
</html>
