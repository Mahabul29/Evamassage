<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#f0f2f5;}
        
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;padding:8px;border-top:1px solid #ddd;z-index:100;}
        .nav-btn{flex:1;text-align:center;background:none;border:none;padding:8px;color:#666;cursor:pointer;}
        .nav-btn.active{color:#00a884;}
        .nav-btn i{font-size:22px;display:block;margin-bottom:4px;}
        
        .sidebar{width:350px;background:#fff;height:100vh;overflow-y:auto;border-right:1px solid #ddd;}
        .chat-area{flex:1;background:#efeae2;display:flex;flex-direction:column;height:100vh;}
        
        .chat-header{background:#075e54;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
        .messages-container{flex:1;overflow-y:auto;padding:15px;}
        
        /* FIXED - Input bar always visible at bottom */
        .input-wrapper{flex-shrink:0;background:#fff;border-top:1px solid #ddd;padding:12px;}
        .input-area{display:flex;gap:10px;align-items:center;}
        .input-area input{flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;outline:none;font-size:14px;}
        .input-area button{background:#00a884;border:none;color:#fff;padding:12px 20px;border-radius:25px;cursor:pointer;min-width:60px;}
        .input-area button:disabled{opacity:0.5;}
        
        .search-box{padding:10px;background:#fff;border-bottom:1px solid #eee;}
        .search-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:25px;outline:none;}
        
        .chat-item{display:flex;padding:12px 15px;border-bottom:1px solid #eee;cursor:pointer;align-items:center;gap:12px;}
        .chat-item:hover{background:#f5f5f5;}
        .avatar{width:50px;height:50px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:18px;flex-shrink:0;}
        
        .channel-item{padding:15px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
        .channel-item:hover{background:#f5f5f5;}
        
        .menu-item{padding:15px;border-bottom:1px solid #eee;cursor:pointer;}
        .menu-item i{width:30px;}
        
        .msg{max-width:70%;margin-bottom:10px;padding:8px 12px;border-radius:18px;word-break:break-word;}
        .msg.sent{background:#dcf8c5;margin-left:auto;text-align:right;}
        .msg.recv{background:#fff;}
        .msg-name{font-size:11px;color:#075e54;font-weight:bold;margin-bottom:3px;}
        .msg-time{font-size:10px;color:#999;margin-top:3px;}
        
        .empty-state{padding:50px;text-align:center;color:#999;}
        .empty-state i{font-size:48px;margin-bottom:15px;opacity:0.5;}
        
        .tab-content{display:none;height:100%;}
        .tab-content.active{display:block;}
        
        .back-btn{background:none;border:none;color:#fff;margin-right:10px;display:none;font-size:18px;}
        
        @media(max-width:768px){
            .sidebar{position:fixed;left:0;top:0;z-index:10;transition:transform 0.3s;width:100%;height:100vh;}
            .sidebar.hide{transform:translateX(-100%);}
            .chat-area{width:100%;}
            .back-btn{display:block !important;}
        }
        
        .modal-content{border-radius:15px;}
        .avatar-large{width:80px;height:80px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 15px;color:#fff;}
        .bio-box{padding:10px;background:#f5f5f5;border-radius:10px;}
        
        .install-popup{position:fixed;bottom:80px;left:10px;right:10px;background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:1000;padding:16px;display:none;}
        .install-content{display:flex;align-items:center;gap:12px;position:relative;}
        .install-icon{width:50px;height:50px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;}
        .install-text{flex:1;}
        .install-text h4{margin:0;font-size:16px;}
        .install-text p{margin:0;font-size:12px;color:#666;}
        .install-btn{background:#00a884;border:none;color:#fff;padding:8px 16px;border-radius:25px;cursor:pointer;}
        .close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#999;position:absolute;top:-5px;right:-5px;}
        
        /* Make sure chat area takes full height */
        .main-container{display:flex;height:100vh;overflow:hidden;}
    </style>
</head>
<body>
<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div style="background:#075e54; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <i class="fas fa-comment-dots"></i>
                <small class="d-block" style="font-size:12px;">{{ user.full_name }}</small>
            </div>
            <div>
                <a href="/profile" class="text-white me-3"><i class="fas fa-user-circle fa-lg"></i></a>
                <a href="/settings" class="text-white"><i class="fas fa-cog fa-lg"></i></a>
            </div>
        </div>
        
        <div id="chatsTab" class="tab-content active">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search users..."></div>
            <div id="chatList"><div class="empty-state"><i class="fas fa-comments"></i><br>No chats yet<br><small>Search for people above</small></div></div>
        </div>
        
        <div id="channelsTab" class="tab-content">
            <div class="search-box"><button class="btn btn-success w-100" onclick="showChannelModal()"><i class="fas fa-plus"></i> Create Channel</button></div>
            <div id="channelsList"><div class="empty-state"><i class="fas fa-hashtag"></i><br>No channels yet</div></div>
        </div>
        
        <div id="settingsTab" class="tab-content">
            <div class="menu-item" onclick="location.href='/profile'"><i class="fas fa-user-circle"></i> Edit Profile</div>
            <div class="menu-item" onclick="location.href='/settings'"><i class="fas fa-cog"></i> App Settings</div>
            <div class="menu-item text-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>
    
    <!-- Chat Area - FIXED with input always visible -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <span id="chatTitle">Select a chat</span>
            <i class="fas fa-info-circle" onclick="openProfile()" style="cursor:pointer;"></i>
        </div>
        
        <div class="messages-container" id="messagesArea">
            <div class="empty-state"><i class="fas fa-comment-dots"></i><br>Select a conversation to start</div>
        </div>
        
        <!-- INPUT AREA - Always visible at bottom -->
        <div class="input-wrapper">
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter')sendMsg()">
                <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('chats')"><i class="fas fa-comment-dots"></i><span>Chats</span></button>
    <button class="nav-btn" onclick="switchTab('channels')"><i class="fas fa-hashtag"></i><span>Channels</span></button>
    <button class="nav-btn" onclick="switchTab('settings')"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<!-- Channel Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white"><h5><i class="fas fa-hashtag"></i> Create Channel</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="channelName" class="form-control mb-3" placeholder="Channel name">
                <textarea id="channelDesc" class="form-control" placeholder="Description" rows="3"></textarea>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="createChannel()">Create</button></div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5><i class="fas fa-user-circle"></i> Profile</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center">
                <div class="avatar-large">👤</div>
                <h4 id="pName">-</h4>
                <p class="text-muted" id="pUsername">@-</p>
                <p id="pBio" class="bio-box">-</p>
                <button class="btn btn-success w-100" onclick="sendFromProfile()"><i class="fas fa-paper-plane"></i> Send Message</button>
            </div>
        </div>
    </div>
</div>

<!-- Install Popup -->
<div id="installPopup" class="install-popup">
    <div class="install-content">
        <div class="install-icon">💬</div>
        <div class="install-text"><h4>EvaMassage</h4><p>Install app for better experience</p></div>
        <button onclick="installApp()" class="install-btn">Install</button>
        <button onclick="closeInstallPopup()" class="close-btn">&times;</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ========== VARIABLES ==========
let currentId = null;
let currentType = 'user';
let currentName = '';
let msgTimer = null;
let profileId = null;
let deferredPrompt = null;
const ME = {{ user.user_id }};

// ========== TAB SWITCH ==========
function switchTab(tab){
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    event.target.classList.add('active');
    if(tab == 'chats') loadChats();
    if(tab == 'channels') loadChannels();
}

// ========== CHATS ==========
function loadChats(){
    $.get('/api/chats', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty-state"><i class="fas fa-comments"></i><br>No chats yet<br><small>Search for people above</small></div>';
        } else {
            data.forEach(c => {
                html += `<div class="chat-item">
                    <div onclick="selectChat(${c.user_id},'${escapeHtml(c.full_name)}','user')" style="flex:1;display:flex;gap:12px;">
                        <div class="avatar">${escapeHtml(c.full_name.charAt(0).toUpperCase())}</div>
                        <div><b>${escapeHtml(c.full_name)}</b><br><small>${c.last_message ? escapeHtml(c.last_message.substring(0,30)) : 'Tap to chat'}</small></div>
                    </div>
                    <button class="btn btn-sm" onclick="viewProfile(${c.user_id},'${escapeHtml(c.full_name)}')"><i class="fas fa-info-circle"></i></button>
                </div>`;
            });
        }
        $('#chatList').html(html);
    });
}

// ========== CHANNELS ==========
function loadChannels(){
    $.get('/api/channels', function(data){
        let html = '';
        if(!data || data.length === 0){
            html = '<div class="empty-state"><i class="fas fa-hashtag"></i><br>No channels yet<br><button class="btn btn-sm btn-success mt-2" onclick="showChannelModal()">Create First Channel</button></div>';
        } else {
            data.forEach(c => {
                html += `<div class="channel-item" onclick="selectChat('${c.id}','${escapeHtml(c.name)}','channel')">
                    <div><i class="fas fa-hashtag"></i> <b>${escapeHtml(c.name)}</b><br><small>${escapeHtml(c.description) || 'No description'}</small></div>
                    <span class="badge bg-secondary">${c.member_count} members</span>
                </div>`;
            });
        }
        $('#channelsList').html(html);
    });
}

// ========== SELECT CHAT ==========
function selectChat(id, name, type){
    currentId = id;
    currentType = type;
    currentName = name;
    $('#chatTitle').html('<i class="fas fa-comment"></i> ' + escapeHtml(name));
    
    if(type == 'user'){
        loadMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadMessages, 3000);
    } else {
        loadChannelMessages();
        if(msgTimer) clearInterval(msgTimer);
        msgTimer = setInterval(loadChannelMessages, 3000);
    }
    
    if(window.innerWidth <= 768){
        $('#sidebar').addClass('hide');
    }
}

// ========== PRIVATE MESSAGES ==========
function loadMessages(){
    if(!currentId || currentType != 'user') return;
    $.get('/api/messages/' + currentId, function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty-state"><i class="fas fa-comment-dots"></i><br>No messages yet<br><small>Say hello!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = ((m.from_id || m.sender_id || m.user_id) === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">${escapeHtml(m.message)}<div class="msg-time">${formatTime(m.created_at)}</div></div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// ========== CHANNEL MESSAGES ==========
function loadChannelMessages(){
    if(!currentId || currentType != 'channel') return;
    $.get('/api/channels/' + currentId + '/messages', function(msgs){
        let html = '';
        if(!msgs || msgs.length === 0){
            html = '<div class="empty-state"><i class="fas fa-hashtag"></i><br>No messages in channel<br><small>Be the first to message!</small></div>';
        } else {
            msgs.forEach(m => {
                let sent = ((m.from_id || m.sender_id || m.user_id) === ME);
                html += `<div class="msg ${sent ? 'sent' : 'recv'}">
                    ${!sent ? '<div class="msg-name">' + escapeHtml(m.from_name) + '</div>' : ''}
                    ${escapeHtml(m.message)}
                    <div class="msg-time">${formatTime(m.created_at)}</div>
                </div>`;
            });
        }
        $('#messagesArea').html(html);
        $('#messagesArea').scrollTop($('#messagesArea')[0].scrollHeight);
    });
}

// ========== SEND MESSAGE ==========
function sendMsg(){
    let msg = $('#msgInput').val().trim();
    if(!msg){
        console.log("No message");
        return;
    }
    if(!currentId){
        alert("Please select a chat first");
        return;
    }
    
    let originalMsg = msg;
    $('#msgInput').val('');
    $('#msgInput').prop('disabled', true);
    
    if(currentType == 'user'){
        $.ajax({
            url: '/api/messages/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({to_id: currentId, message: msg}),
            success: function(r){
                if(r.success){
                    loadMessages();
                    loadChats();
                } else {
                    alert(r.error || 'Failed to send');
                    $('#msgInput').val(originalMsg);
                }
            },
            error: function(){ 
                alert('Failed to send'); 
                $('#msgInput').val(originalMsg);
            },
            complete: function(){ 
                $('#msgInput').prop('disabled', false); 
                $('#msgInput').focus(); 
            }
        });
    } else {
        $.ajax({
            url: '/api/channels/' + currentId + '/send',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({message: msg}),
            success: function(r){
                if(r.success){
                    loadChannelMessages();
                } else {
                    alert(r.error || 'Failed to send to channel');
                    $('#msgInput').val(originalMsg);
                }
            },
            error: function(){ 
                alert('Failed to send'); 
                $('#msgInput').val(originalMsg);
            },
            complete: function(){ 
                $('#msgInput').prop('disabled', false); 
                $('#msgInput').focus(); 
            }
        });
    }
}

// ========== CREATE CHANNEL ==========
function createChannel(){
    let name = $('#channelName').val().trim();
    if(!name){ alert('Enter channel name'); return; }
    
    $.ajax({
        url: '/api/channels',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({name: name, description: $('#channelDesc').val()}),
        success: function(r){
            if(r.success){
                $('#channelModal').modal('hide');
                $('#channelName,#channelDesc').val('');
                loadChannels();
                switchTab('channels');
                alert('Channel "' + r.name + '" created!');
            } else { alert(r.error); }
        },
        error: function(xhr){ alert(xhr.responseJSON?.error || 'Failed'); }
    });
}

// ========== PROFILE ==========
function viewProfile(id, name){
    profileId = id;
    $('#pName').text(name);
    $('#pUsername').text('@loading...');
    $('#pBio').text('Loading...');
    $.get('/api/users/profile/' + id, function(p){
        $('#pName').text(p.full_name || name);
        $('#pUsername').text('@' + (p.username || ''));
        $('#pBio').text(p.bio || 'No bio');
    });
    new bootstrap.Modal(document.getElementById('profileModal')).show();
}

function sendFromProfile(){
    if(profileId){
        $('#profileModal').modal('hide');
        $.get('/api/users/profile/' + profileId, function(p){
            selectChat(profileId, p.full_name, 'user');
        });
    }
}

function openProfile(){
    if(currentId && currentType == 'user') viewProfile(currentId, currentName);
}

// ========== UTILITIES ==========
function goBack(){ $('#sidebar').removeClass('hide'); }
function logout(){ if(confirm('Logout?')) window.location.href = '/logout'; }
function showChannelModal(){ $('#channelModal').modal('show'); }

function escapeHtml(t){
    if(!t) return '';
    return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatTime(s){
    try{
        let d = new Date(s);
        if(isNaN(d)) return '';
        let now = new Date();
        if(d.toDateString() === now.toDateString()){
            return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
        return d.toLocaleDateString([], {month:'short', day:'numeric'});
    } catch(e){ return ''; }
}

    // ========== SEARCH USERS ==========
let searchTimer;
$('#searchInput').on('input', function(){
    let q = $(this).val().trim();
    clearTimeout(searchTimer);
    if(q.length < 2){ 
        loadChats(); 
        return; 
    }
    searchTimer = setTimeout(() => {
        $.get('/api/users/search', {q: q}, function(users){
            let html = '';
            if(!users || users.length === 0){
                html = '<div class="empty-state">No users found</div>';
            } else {
                users.forEach(u => {
                    html += `<div class="chat-item" onclick="selectChat(${u.user_id},'${escapeHtml(u.full_name)}','user');$('#searchInput').val('');loadChats();">
                        <div class="avatar">${escapeHtml(u.full_name.charAt(0).toUpperCase())}</div>
                        <div><b>${escapeHtml(u.full_name)}</b><br><small>@${escapeHtml(u.username)}</small></div>
                    </div>`;
                });
            }
            $('#chatList').html(html);
        });
    }, 300);
});

// ========== INSTALL POPUP ==========
function showInstallPopup(){ 
    if(!localStorage.getItem('popupClosed')) 
        $('#installPopup').show(); 
}

function closeInstallPopup(){ 
    $('#installPopup').hide(); 
    localStorage.setItem('popupClosed','true'); 
}

function installApp(){
    if(deferredPrompt){ 
        deferredPrompt.prompt(); 
        deferredPrompt = null; 
    } else { 
        alert('Tap Share → Add to Home Screen'); 
    }
    closeInstallPopup();
}

window.addEventListener('beforeinstallprompt', (e) => { 
    e.preventDefault(); 
    deferredPrompt = e; 
    showInstallPopup(); 
});

setTimeout(() => { 
    if(!localStorage.getItem('popupClosed') && !deferredPrompt) 
        showInstallPopup(); 
}, 3000);

// ========== INIT ==========
$(function(){ 
    loadChats(); 
    setInterval(loadChats, 10000); 
});
</script>
</body>
</html>
