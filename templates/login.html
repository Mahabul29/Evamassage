<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease-out;
            background: white;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
        }
        
        .nav-tabs .nav-link {
            color: #667eea;
            font-weight: 500;
            border: none;
        }
        
        .nav-tabs .nav-link.active {
            color: #764ba2;
            border-bottom: 2px solid #764ba2;
            background: transparent;
        }
        
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.25);
        }
        
        .input-group-text {
            background: transparent;
            border-right: none;
            color: #764ba2;
        }
        
        .form-control {
            border-left: none;
        }
        
        .form-control:focus {
            border-left: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-comment-dots fa-4x" style="color: #667eea"></i>
                    <h2 class="mt-3 mb-2">EvaMassage</h2>
                    <p class="text-muted">Connect with amazing people</p>
                </div>
                
                <ul class="nav nav-tabs mb-4" id="authTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login" type="button">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register" type="button">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content">
                    <!-- Login Tab -->
                    <div class="tab-pane fade show active" id="login">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" required autocomplete="off">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </form>
                    </div>
                    
                    <!-- Register Tab -->
                    <div class="tab-pane fade" id="register">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" id="fullName" class="form-control" placeholder="Your full name">
                                </div>
                                <small class="text-muted">Optional - will use username if empty</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-at"></i></span>
                                    <input type="text" id="regUsername" class="form-control" placeholder="Choose username" required autocomplete="off">
                                </div>
                                <small class="text-muted">Minimum 3 characters</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                                    <input type="password" id="regPassword" class="form-control" placeholder="Choose password" required>
                                </div>
                                <small class="text-muted">Minimum 4 characters</small>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Alert Modal -->
    <div class="modal fade" id="alertModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" id="alertHeader">
                    <h5 class="modal-title" id="alertTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="alertMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showAlert(title, message, isError = false) {
            $('#alertTitle').text(title);
            $('#alertMessage').text(message);
            $('#alertHeader').removeClass('bg-success bg-danger').addClass(isError ? 'bg-danger text-white' : 'bg-success text-white');
            new bootstrap.Modal(document.getElementById('alertModal')).show();
        }
        
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            const username = $('#loginUsername').val().trim();
            const password = $('#loginPassword').val();
            
            if (!username || !password) {
                showAlert('Error', 'Please enter both username and password', true);
                return;
            }
            
            $.post('/api/login', {
                username: username,
                password: password
            }, function(response) {
                if (response.success) {
                    window.location.href = '/dashboard';
                } else {
                    showAlert('Login Failed', response.error || 'Invalid username or password', true);
                }
            }).fail(function(xhr) {
                const error = xhr.responseJSON?.error || 'Login failed. Please try again.';
                showAlert('Error', error, true);
            });
        });
        
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            
            const username = $('#regUsername').val().trim();
            const password = $('#regPassword').val();
            let fullName = $('#fullName').val().trim();
            
            if (!username || username.length < 3) {
                showAlert('Error', 'Username must be at least 3 characters', true);
                return;
            }
            
            if (!password || password.length < 4) {
                showAlert('Error', 'Password must be at least 4 characters', true);
                return;
            }
            
            if (!fullName) {
                fullName = username;
            }
            
            $.post('/api/register', {
                username: username,
                password: password,
                full_name: fullName
            }, function(response) {
                if (response.success) {
                    showAlert('Success', response.message, false);
                    $('#registerForm')[0].reset();
                    // Switch to login tab
                    $('#authTab button:first-child').tab('show');
                } else {
                    showAlert('Registration Failed', response.error || 'Username may already exist', true);
                }
            }).fail(function(xhr) {
                const error = xhr.responseJSON?.error || 'Registration failed. Please try again.';
                showAlert('Error', error, true);
            });
        });
        
        // Enter key support
        $('#loginPassword, #regPassword').on('keypress', function(e) {
            if (e.which === 13) {
                e.preventDefault();
                if ($(this).closest('#login').length) {
                    $('#loginForm').submit();
                } else {
                    $('#registerForm').submit();
                }
            }
        });
    </script>
</body>
</html>
