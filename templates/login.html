<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EvaMassage - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: white;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card .card-body {
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo h2 {
            margin-top: 10px;
            color: #333;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .nav-tabs {
            border: none;
            margin-bottom: 25px;
        }
        
        .nav-tabs .nav-link {
            border: none;
            color: #667eea;
            font-weight: 500;
            padding: 10px 0;
            margin-right: 30px;
            background: transparent;
        }
        
        .nav-tabs .nav-link.active {
            color: #764ba2;
            border-bottom: 2px solid #764ba2;
            background: transparent;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }
        
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .login-card .card-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-body">
                <div class="logo">
                    <i class="fas fa-comment-dots"></i>
                    <h2>EvaMassage</h2>
                    <p>Connect with amazing people</p>
                </div>
                
                <ul class="nav nav-tabs" id="authTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content">
                    <!-- Login Tab -->
                    <div class="tab-pane fade show active" id="login">
                        <form id="loginForm">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" required autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                            <div id="loginError" class="alert alert-danger"></div>
                        </form>
                    </div>
                    
                    <!-- Register Tab -->
                    <div class="tab-pane fade" id="register">
                        <form id="registerForm">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="fullName" class="form-control" placeholder="Your full name (optional)">
                            </div>
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="regUsername" class="form-control" placeholder="Choose username" required autocomplete="off">
                                <small style="color: #666;">Minimum 3 characters</small>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="regPassword" class="form-control" placeholder="Choose password" required>
                                <small style="color: #666;">Minimum 4 characters</small>
                            </div>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                            <div id="registerError" class="alert alert-danger"></div>
                            <div id="registerSuccess" class="alert alert-success"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // REGISTER FORM
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            
            $('#registerError').hide();
            $('#registerSuccess').hide();
            
            const fullName = $('#fullName').val();
            const username = $('#regUsername').val().toLowerCase();
            const password = $('#regPassword').val();
            
            $.ajax({
                url: '/api/register',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    full_name: fullName,
                    username: username,
                    password: password
                }),
                success: function(response) {
                    if (response.success) {
                        $('#registerSuccess').text(response.message).show();
                        $('#registerForm')[0].reset();
                        setTimeout(function() {
                            $('#authTab button:first-child').tab('show');
                            $('#registerSuccess').hide();
                        }, 2000);
                    } else {
                        $('#registerError').text(response.error).show();
                    }
                },
                error: function(xhr) {
                    let errorMsg = 'Registration failed';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    $('#registerError').text(errorMsg).show();
                }
            });
        });
        
        // LOGIN FORM
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            $('#loginError').hide();
            
            const username = $('#loginUsername').val().toLowerCase();
            const password = $('#loginPassword').val();
            
            $.ajax({
                url: '/api/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    username: username,
                    password: password
                }),
                success: function(response) {
                    if (response.success) {
                        window.location.href = '/dashboard';
                    } else {
                        $('#loginError').text(response.error).show();
                    }
                },
                error: function(xhr) {
                    let errorMsg = 'Login failed';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    $('#loginError').text(errorMsg).show();
                }
            });
        });
        
        // Enter key support
        $('#loginPassword, #regPassword').on('keypress', function(e) {
            if (e.which === 13) {
                e.preventDefault();
                if ($(this).closest('#login').length) {
                    $('#loginForm').submit();
                } else {
                    $('#registerForm').submit();
                }
            }
        });
    </script>
</body>
</html>
