<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaMassage - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
        }
        .nav-tabs .nav-link {
            color: #667eea;
            font-weight: 500;
            border: none;
        }
        .nav-tabs .nav-link.active {
            color: #764ba2;
            border-bottom: 2px solid #764ba2;
            background: transparent;
        }
        .alert {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-comment-dots fa-4x" style="color: #667eea"></i>
                    <h2 class="mt-3">EvaMassage</h2>
                    <p class="text-muted">Connect with amazing people</p>
                </div>
                
                <ul class="nav nav-tabs mb-4" id="authTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">Register</button>
                    </li>
                </ul>
                
                <div class="tab-content">
                    <!-- Login Tab -->
                    <div class="tab-pane fade show active" id="login">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="loginUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="loginPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                            <div id="loginError" class="alert alert-danger"></div>
                        </form>
                    </div>
                    
                    <!-- Register Tab -->
                    <div class="tab-pane fade" id="register">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label>Full Name</label>
                                <input type="text" id="fullName" class="form-control" placeholder="Optional">
                            </div>
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="regUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="regPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Create Account</button>
                            <div id="registerError" class="alert alert-danger"></div>
                            <div id="registerSuccess" class="alert alert-success"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test API connection first
        $.get('/api/test', function(data) {
            console.log('API Test:', data);
        });
        
        // REGISTER FORM
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            
            // Hide previous messages
            $('#registerError').hide();
            $('#registerSuccess').hide();
            
            const fullName = $('#fullName').val();
            const username = $('#regUsername').val();
            const password = $('#regPassword').val();
            
            console.log('Registering:', {username, fullName, password: '***'});
            
            $.ajax({
                url: '/api/register',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    full_name: fullName,
                    username: username,
                    password: password
                }),
                success: function(response) {
                    console.log('Register success:', response);
                    if (response.success) {
                        $('#registerSuccess').text(response.message).show();
                        $('#registerForm')[0].reset();
                        // Switch to login tab after 2 seconds
                        setTimeout(function() {
                            $('#authTab button:first-child').tab('show');
                            $('#registerSuccess').hide();
                        }, 2000);
                    } else {
                        $('#registerError').text(response.error).show();
                    }
                },
                error: function(xhr) {
                    console.error('Register error:', xhr);
                    let errorMsg = 'Registration failed';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    $('#registerError').text(errorMsg).show();
                }
            });
        });
        
        // LOGIN FORM
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            $('#loginError').hide();
            
            const username = $('#loginUsername').val();
            const password = $('#loginPassword').val();
            
            console.log('Logging in:', {username});
            
            $.ajax({
                url: '/api/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    username: username,
                    password: password
                }),
                success: function(response) {
                    console.log('Login success:', response);
                    if (response.success) {
                        window.location.href = '/dashboard';
                    } else {
                        $('#loginError').text(response.error).show();
                    }
                },
                error: function(xhr) {
                    console.error('Login error:', xhr);
                    let errorMsg = 'Login failed';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    $('#loginError').text(errorMsg).show();
                }
            });
        });
    </script>
</body>
</html>
