<div class="sidebar" id="sidebar">
    <!-- Chats Tab -->
    <div id="chatsTab" class="tab-content active">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search users...">
        </div>
        <div id="chatList" class="chat-list">
            <div class="empty-state">No chats yet</div>
        </div>
    </div>
    
    <!-- Channels Tab -->
    <div id="channelsTab" class="tab-content">
        <div class="search-box">
            <button class="btn btn-success w-100" onclick="showChannelModal()">
                <i class="fas fa-plus"></i> Create Channel
            </button>
        </div>
        <div id="channelsList" class="chat-list">
            <div class="empty-state">No channels yet</div>
        </div>
    </div>
    
    <!-- Settings Tab -->
    <div id="settingsTab" class="tab-content">
        <div class="menu-item" onclick="location.href='/profile'">
            <i class="fas fa-user-circle"></i> Edit Profile
        </div>
        <div class="menu-item" onclick="location.href='/settings'">
            <i class="fas fa-cog"></i> App Settings
        </div>
        <div class="menu-item text-danger" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </div>
    </div>
</div>
