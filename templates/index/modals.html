<!-- Channel Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5><i class="fas fa-hashtag"></i> Create Channel</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="channelName" class="form-control mb-3" placeholder="Channel name">
                <textarea id="channelDesc" class="form-control" placeholder="Description" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" onclick="createChannel()">Create</button>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5><i class="fas fa-user-circle"></i> Profile</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div class="avatar-large" id="modalAvatar">👤</div>
                <h4 id="pName">-</h4>
                <p class="text-muted" id="pUsername">@-</p>
                <p id="pBio" class="bio-box">-</p>
                <button class="btn btn-success w-100" onclick="sendFromProfile()">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Install Popup -->
<div id="installPopup" class="install-popup" style="display:none;">
    <div class="install-content">
        <div class="install-icon">💬</div>
        <div class="install-text">
            <h4>EvaMassage</h4>
            <p>Install app for better experience</p>
        </div>
        <button onclick="installApp()" class="install-btn">Install</button>
        <button onclick="closeInstallPopup()" class="close-btn">&times;</button>
    </div>
</div>
